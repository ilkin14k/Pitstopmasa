<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>☕ Masa İdarəsi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f0f13;font-family:'Segoe UI',system-ui,sans-serif;color:#f0ece4;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input,select,button,textarea{font-family:inherit}
select option{background:#1a1a24;color:#f0ece4}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const INDOOR = Array.from({length:15},(_,i)=>({id:i+1,loc:"içəri"}));
const OUTDOOR = Array.from({length:15},(_,i)=>({id:i+16,loc:"çöl"}));
const ALL_TABLES = [...INDOOR,...OUTDOOR];
const ALL_CATS = ["Hamısı","İçki","Yemək","Şirniyyat","Set","Əlavə"];

const DEFAULT_MENU = [
  {id:1,name:"Çay",price:2.50,cat:"İçki"},
  {id:2,name:"Şokolad Qara",price:5.00,cat:"Şirniyyat"},
  {id:3,name:"Şokolad Ağ",price:6.00,cat:"Şirniyyat"},
  {id:4,name:"Rulet",price:3.00,cat:"Şirniyyat"},
  {id:5,name:"Snickers",price:1.50,cat:"Şirniyyat"},
  {id:6,name:"Pepsi 2L",price:5.00,cat:"İçki"},
  {id:7,name:"Pepsi 1L",price:3.00,cat:"İçki"},
  {id:8,name:"Kola 2L",price:5.00,cat:"İçki"},
  {id:9,name:"Kola 2.5L",price:6.00,cat:"İçki"},
  {id:10,name:"Kola 1L",price:3.00,cat:"İçki"},
  {id:11,name:"Sprite 2L",price:5.00,cat:"İçki"},
  {id:12,name:"Sprite 1L",price:3.00,cat:"İçki"},
  {id:13,name:"Limonad 1L",price:3.00,cat:"İçki"},
  {id:14,name:"Pide (Sucuklu)",price:6.00,cat:"Yemək"},
  {id:15,name:"Pide (Qiyməli)",price:5.00,cat:"Yemək"},
  {id:16,name:"Pide (Toyuqlu)",price:6.00,cat:"Yemək"},
  {id:17,name:"Çeburek mini (30)",price:4.00,cat:"Yemək"},
  {id:18,name:"Corat qutab (12)",price:4.00,cat:"Yemək"},
  {id:19,name:"Burger (Toyuq)",price:3.00,cat:"Yemək"},
  {id:20,name:"Burger (Katlet)",price:3.00,cat:"Yemək"},
  {id:21,name:"Burger (Sosiska)",price:3.00,cat:"Yemək"},
  {id:22,name:"Tost",price:2.00,cat:"Yemək"},
  {id:23,name:"Set 11",price:11.00,cat:"Set"},
  {id:24,name:"Set 16",price:16.00,cat:"Set"},
  {id:25,name:"Limon (əlavə)",price:0.50,cat:"Əlavə"},
];

const DEFAULT_STOCK = [
  {id:1,name:"Un",unit:"kq",qty:25,min:10},
  {id:2,name:"Pendir",unit:"kq",qty:8,min:3},
  {id:3,name:"Ət (qiymə)",unit:"kq",qty:12,min:5},
  {id:4,name:"Çay (dəmlik)",unit:"ədəd",qty:150,min:50},
  {id:5,name:"Burger çörəyi",unit:"ədəd",qty:40,min:15},
  {id:6,name:"Pepsi/Kola/Sprite",unit:"şüşə",qty:24,min:10},
];

const DEFAULT_CREDS = {admin:"admin123", waiter:"ofisiant123"};

const ls = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

function todayStr(){return new Date().toLocaleDateString("az-AZ",{day:"2-digit",month:"2-digit",year:"numeric"});}
function timeStr(){return new Date().toLocaleTimeString("az-AZ",{hour:"2-digit",minute:"2-digit"});}
function initTables(){return ALL_TABLES.reduce((a,t)=>{a[t.id]={orders:[]};return a;},{});}

const C={
  bg:"#0f0f13",card:"#1e1e2c",border:"#2a2a38",
  gold:"#f0c060",green:"#6ddd6d",blue:"#6db3dd",red:"#dd6d6d",
  muted:"#8888aa",text:"#f0ece4",dark:"#12121a",
};

const inp = {background:C.dark,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:14,padding:"11px 14px",outline:"none",width:"100%",boxSizing:"border-box"};
const btn = (bg,color,extra={})=>({background:bg,border:"none",borderRadius:10,color,fontWeight:700,cursor:"pointer",fontFamily:"inherit",...extra});

// ══════════════════════════════════════════
// LOGIN SCREEN
// ══════════════════════════════════════════
function LoginScreen({onLogin}){
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const creds=ls.get("creds",DEFAULT_CREDS);

  function tryLogin(){
    if(pass===creds.admin){onLogin("admin");setErr("");}
    else if(pass===creds.waiter){onLogin("waiter");setErr("");}
    else{setErr("Şifrə yanlışdır");setPass("");}
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:52,marginBottom:12}}>☕</div>
          <div style={{fontSize:22,fontWeight:800,color:C.gold}}>Masa İdarəsi</div>
          <div style={{fontSize:13,color:C.muted,marginTop:6}}>Daxil olmaq üçün şifrəni daxil edin</div>
        </div>
        <div style={{background:C.card,borderRadius:16,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:13,color:C.muted,marginBottom:8}}>Şifrə</div>
          <input style={{...inp,marginBottom:16,fontSize:16,letterSpacing:3}} type="password"
            placeholder="••••••••" value={pass}
            onChange={e=>{setPass(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&tryLogin()}
            autoFocus/>
          {err&&<div style={{color:C.red,fontSize:13,marginBottom:12,textAlign:"center"}}>❌ {err}</div>}
          <button onClick={tryLogin} style={{...btn("linear-gradient(135deg,#f0c060,#d4a030)","#0f0f13"),width:"100%",padding:14,fontSize:15}}>
            Daxil ol
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:12,color:"#444"}}>
          Admin və ofisiant üçün ayrı şifrələr mövcuddur
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════
function App(){
  const [role,setRole]=useState(()=>ls.get("role",null));
  const [tables,setTables]=useState(()=>ls.get("ct3",initTables()));
  const [menu,setMenu]=useState(()=>ls.get("cm1",DEFAULT_MENU));
  const [stock,setStock]=useState(()=>ls.get("stock1",DEFAULT_STOCK));
  const [expenses,setExpenses]=useState(()=>ls.get("exp1",[]));
  const [workDate,setWorkDate]=useState(()=>ls.get("wd",todayStr()));
  const [history,setHistory]=useState(()=>ls.get("ch2",[]));
  const [view,setView]=useState("tables");
  const [selTable,setSelTable]=useState(null);
  const [loc,setLoc]=useState("içəri");
  const [showOrder,setShowOrder]=useState(false);
  const [showPay,setShowPay]=useState(false);
  const [showDate,setShowDate]=useState(false);
  const [showReset,setShowReset]=useState(false);
  const [menuSearch,setMenuSearch]=useState("");
  const [menuCat,setMenuCat]=useState("Hamısı");
  const [custom,setCustom]=useState({name:"",price:"",qty:1});
  const [newItem,setNewItem]=useState({name:"",price:"",cat:"İçki"});
  const [delConfirm,setDelConfirm]=useState(null);
  const [dateInput,setDateInput]=useState("");
  const [newStock,setNewStock]=useState({name:"",unit:"ədəd",qty:"",min:""});
  const [stockAdd,setStockAdd]=useState({});
  const [newExp,setNewExp]=useState({cat:"Məhsul alışı",desc:"",amount:"",method:"Nağd"});
  const [creds,setCreds]=useState(()=>ls.get("creds",DEFAULT_CREDS));
  const [pwForm,setPwForm]=useState({adminPw:"",waiterPw:""});
  const [pwMsg,setPwMsg]=useState("");

  useEffect(()=>ls.set("ct3",tables),[tables]);
  useEffect(()=>ls.set("cm1",menu),[menu]);
  useEffect(()=>ls.set("stock1",stock),[stock]);
  useEffect(()=>ls.set("exp1",expenses),[expenses]);
  useEffect(()=>ls.set("wd",workDate),[workDate]);
  useEffect(()=>ls.set("ch2",history),[history]);
  useEffect(()=>ls.set("role",role),[role]);
  useEffect(()=>ls.set("creds",creds),[creds]);

  function logout(){setRole(null);ls.set("role",null);setView("tables");}

  const getTotal=tid=>(tables[tid]?.orders||[]).filter(o=>!o.x).reduce((s,o)=>s+o.p*o.q,0);

  function addOrder(item,qty,note){
    setTables(prev=>({...prev,[selTable]:{...prev[selTable],orders:[...prev[selTable].orders,
      {id:Date.now(),n:item.name,p:item.price,q:qty,note,t:timeStr(),x:false}
    ]}}));
    setShowOrder(false);setMenuSearch("");setCustom({name:"",price:"",qty:1});
  }

  function cancelOrder(tid,oid){
    setTables(prev=>({...prev,[tid]:{...prev[tid],orders:prev[tid].orders.map(o=>o.id===oid?{...o,x:true}:o)}}));
  }

  function payTable(method){
    const total=getTotal(selTable);
    const isIn=selTable<=15;
    setHistory(prev=>[{date:workDate,time:timeStr(),
      label:isIn?`İçəri ${selTable}`:`Çöl ${selTable-15}`,
      orders:tables[selTable].orders.filter(o=>!o.x),total,method},...prev]);
    setTables(prev=>({...prev,[selTable]:{orders:[]}}));
    setShowPay(false);setSelTable(null);setView("tables");
  }

  function addMenuItem(){
    if(!newItem.name.trim()||!newItem.price)return;
    setMenu(prev=>[...prev,{id:Date.now(),name:newItem.name.trim(),price:parseFloat(newItem.price),cat:newItem.cat}]);
    setNewItem({name:"",price:"",cat:"İçki"});
  }

  function addExpense(){
    if(!newExp.desc.trim()||!newExp.amount)return;
    setExpenses(prev=>[...prev,{id:Date.now(),date:workDate,time:timeStr(),...newExp,amount:parseFloat(newExp.amount)}]);
    setNewExp({cat:"Məhsul alışı",desc:"",amount:"",method:"Nağd"});
  }

  function updateStock(id,delta){
    setStock(prev=>prev.map(s=>s.id===id?{...s,qty:Math.max(0,s.qty+delta)}:s));
  }

  function savePasswords(){
    let updated={...creds};
    if(pwForm.adminPw.trim()) updated.admin=pwForm.adminPw.trim();
    if(pwForm.waiterPw.trim()) updated.waiter=pwForm.waiterPw.trim();
    setCreds(updated);
    setPwMsg("✅ Şifrələr yadda saxlandı!");
    setPwForm({adminPw:"",waiterPw:""});
    setTimeout(()=>setPwMsg(""),3000);
  }

  // Stats
  const todayH=history.filter(h=>h.date===workDate);
  const todayTotal=todayH.reduce((s,h)=>s+h.total,0);
  const todayCash=todayH.filter(h=>h.method==="Nağd").reduce((s,h)=>s+h.total,0);
  const todayCard=todayH.filter(h=>h.method==="Kart").reduce((s,h)=>s+h.total,0);
  const todayExp=expenses.filter(e=>e.date===workDate).reduce((s,e)=>s+e.amount,0);
  const activeCount=ALL_TABLES.filter(t=>(tables[t.id]?.orders||[]).filter(o=>!o.x).length>0).length;
  const filtered=menu.filter(m=>(menuCat==="Hamısı"||m.cat===menuCat)&&(menuSearch===""||m.name.toLowerCase().includes(menuSearch.toLowerCase())));

  if(!role) return <LoginScreen onLogin={r=>{setRole(r);ls.set("role",r);}}/>;

  // ── DETAIL VIEW ──
  if(view==="detail"&&selTable){
    const orders=(tables[selTable]?.orders||[]).filter(o=>!o.x);
    const cancelled=(tables[selTable]?.orders||[]).filter(o=>o.x);
    const total=getTotal(selTable);
    const isIn=selTable<=15;
    const dNum=isIn?selTable:selTable-15;
    const dLoc=isIn?"İçəri":"Çöl";
    return(
      <div style={{minHeight:"100vh",background:C.bg,maxWidth:480,margin:"0 auto"}}>
        <div style={{background:"#1a1a24",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:50}}>
          <button onClick={()=>{setView("tables");setSelTable(null);setShowOrder(false);}} style={{...btn("#2a2a38",C.text),padding:"6px 14px",fontSize:13}}>← Geri</button>
          <div style={{flex:1,fontSize:16,fontWeight:700,color:C.gold}}>{dLoc} — Masa {dNum}</div>
          <div style={{fontSize:11,color:C.muted}}>{workDate}</div>
        </div>
        <div style={{padding:"12px 14px",paddingBottom:130}}>
          {orders.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:"#3a3a50"}}>
            <div style={{fontSize:40,marginBottom:8}}>☕</div>
            <div style={{fontSize:14}}>Hələ sifariş yoxdur</div>
            <div style={{fontSize:12,marginTop:4,color:"#555"}}>+ düyməsinə basın</div>
          </div>}
          {orders.map(o=>(
            <div key={o.id} style={{display:"flex",alignItems:"center",padding:"10px 12px",background:C.card,borderRadius:10,marginBottom:7,gap:10,border:`1px solid ${C.border}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:500}}>{o.n}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{o.q} × {o.p.toFixed(2)}₼ · {o.t}{o.note?` · ${o.note}`:""}</div>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:C.green}}>{(o.q*o.p).toFixed(2)}₼</div>
              <button onClick={()=>cancelOrder(selTable,o.id)} style={{...btn("transparent",C.red),fontSize:18,padding:"2px 6px"}}>✕</button>
            </div>
          ))}
          {cancelled.length>0&&<details style={{marginTop:8}}>
            <summary style={{color:"#555570",fontSize:12,cursor:"pointer",padding:"6px 0"}}>Ləğv edilmiş ({cancelled.length})</summary>
            {cancelled.map(o=>(
              <div key={o.id} style={{display:"flex",padding:"8px 12px",background:"#1a1a1a",borderRadius:10,marginBottom:6,opacity:0.4,border:"1px solid #2a2a2a",gap:10}}>
                <div style={{flex:1,fontSize:13,textDecoration:"line-through",color:"#888"}}>{o.n} × {o.q}</div>
                <div style={{fontSize:13,color:"#555"}}>{(o.q*o.p).toFixed(2)}₼</div>
              </div>
            ))}
          </details>}
        </div>
        <button onClick={()=>setShowOrder(true)} style={{position:"fixed",bottom:orders.length>0?90:24,right:20,width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#f0c060,#d4a030)",border:"none",color:"#0f0f13",fontSize:30,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(240,192,96,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>+</button>
        {orders.length>0&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#12121a",borderTop:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,zIndex:100}}>
          <div style={{flex:1}}>
            <div style={{color:C.muted,fontSize:13}}>Cəmi</div>
            <div style={{fontSize:22,fontWeight:800,color:C.gold}}>{total.toFixed(2)} ₼</div>
          </div>
          <button onClick={()=>setShowPay(true)} style={{...btn("linear-gradient(135deg,#2d7a2d,#1f5c1f)","#fff"),padding:"12px 20px",fontSize:14}}>💳 Hesabı Bağla</button>
        </div>}

        {showOrder&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget){setShowOrder(false);setMenuSearch("");}}}>
          <div style={{background:"#1a1a24",borderRadius:"18px 18px 0 0",maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
            <div style={{width:36,height:4,background:"#3a3a50",borderRadius:2,margin:"10px auto 12px"}}/>
            <div style={{padding:"0 16px 12px",borderBottom:`1px solid ${C.border}`,fontSize:16,fontWeight:700,color:C.gold}}>Sifariş əlavə et</div>
            <div style={{padding:"10px 14px 0"}}>
              <input style={{...inp}} placeholder="🔍 Axtar..." value={menuSearch} onChange={e=>setMenuSearch(e.target.value)} autoFocus/>
              <div style={{display:"flex",gap:6,overflowX:"auto",padding:"8px 0",scrollbarWidth:"none"}}>
                {ALL_CATS.map(cat=><button key={cat} onClick={()=>setMenuCat(cat)}
                  style={{...btn(menuCat===cat?C.gold:"#1e1e2c",menuCat===cat?"#0f0f13":C.muted),border:`1px solid ${menuCat===cat?C.gold:C.border}`,borderRadius:20,fontSize:12,padding:"5px 12px",whiteSpace:"nowrap"}}>{cat}</button>)}
              </div>
            </div>
            <div style={{overflowY:"auto",flex:1,padding:"10px 14px 20px"}}>
              {filtered.map(item=><MenuRow key={item.id} item={item} onAdd={addOrder}/>)}
              {filtered.length===0&&<div style={{textAlign:"center",color:"#555",padding:20,fontSize:13}}>Tapılmadı</div>}
              <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Əl ilə daxil et</div>
                <input style={{...inp,marginBottom:8}} placeholder="Məhsul adı" value={custom.name} onChange={e=>setCustom(p=>({...p,name:e.target.value}))}/>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...inp,flex:1}} placeholder="Qiymət" type="number" step="0.01" value={custom.price} onChange={e=>setCustom(p=>({...p,price:e.target.value}))}/>
                  <input style={{...inp,width:65}} placeholder="Say" type="number" min="1" value={custom.qty} onChange={e=>setCustom(p=>({...p,qty:parseInt(e.target.value)||1}))}/>
                  <button onClick={()=>{if(custom.name&&custom.price)addOrder({name:custom.name,price:parseFloat(custom.price)},custom.qty);}}
                    style={{...btn("linear-gradient(135deg,#2d7a2d,#1f5c1f)","#fff"),padding:"10px 12px",fontSize:13,whiteSpace:"nowrap"}}>Əlavə et</button>
                </div>
              </div>
            </div>
          </div>
        </div>}

        {showPay&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)setShowPay(false);}}>
          <div style={{background:"#1a1a24",borderRadius:"18px 18px 0 0",padding:"0 0 30px"}}>
            <div style={{width:36,height:4,background:"#3a3a50",borderRadius:2,margin:"10px auto 12px"}}/>
            <div style={{padding:"0 16px 16px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:16,fontWeight:700,color:C.gold}}>Hesabı Bağla</div>
              <div style={{fontSize:13,color:C.muted,marginTop:4}}>Masa {dNum} · {orders.length} sifariş</div>
            </div>
            <div style={{padding:"24px 16px",textAlign:"center"}}>
              <div style={{fontSize:13,color:C.muted,marginBottom:6}}>Ümumi məbləğ</div>
              <div style={{fontSize:38,fontWeight:800,color:C.gold,marginBottom:24}}>{total.toFixed(2)} ₼</div>
              <div style={{display:"flex",gap:12}}>
                <button onClick={()=>payTable("Nağd")} style={{flex:1,background:"linear-gradient(135deg,#1a4a1a,#0f2e0f)",border:"2px solid #2d7a2d",borderRadius:14,color:C.green,fontWeight:700,fontSize:18,padding:18,cursor:"pointer"}}>💵 Nağd</button>
                <button onClick={()=>payTable("Kart")} style={{flex:1,background:"linear-gradient(135deg,#1a2a4a,#0f1a2e)",border:"2px solid #2d4a7a",borderRadius:14,color:C.blue,fontWeight:700,fontSize:18,padding:18,cursor:"pointer"}}>💳 Kart</button>
              </div>
            </div>
          </div>
        </div>}
      </div>
    );
  }

  // ── HISTORY VIEW ──
  if(view==="history"){
    const grouped=history.reduce((a,h)=>{(a[h.date]=a[h.date]||[]).push(h);return a;},{});
    const monthlyByDate={};
    history.forEach(h=>{
      const [d,m,y]=h.date.split(".");
      const key=`${m}.${y}`;
      monthlyByDate[key]=(monthlyByDate[key]||0)+h.total;
    });
    return(
      <div style={{minHeight:"100vh",background:C.bg,maxWidth:480,margin:"0 auto"}}>
        <div style={{background:"#1a1a24",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:50}}>
          <button onClick={()=>setView("tables")} style={{...btn("#2a2a38",C.text),padding:"6px 14px",fontSize:13}}>← Geri</button>
          <div style={{flex:1,fontSize:16,fontWeight:700,color:C.gold}}>Hesabatlar</div>
          <div style={{fontSize:11,padding:"3px 8px",background:"#2a2a38",borderRadius:6,color:C.gold}}>👑 Admin</div>
        </div>

        {/* Today summary */}
        <div style={{padding:"14px 14px 0"}}>
          <div style={{background:"linear-gradient(135deg,#1a2a1a,#0f1a0f)",borderRadius:14,padding:16,border:"1px solid #2d5a2d",marginBottom:14}}>
            <div style={{fontSize:12,color:C.muted,marginBottom:10,fontWeight:600}}>📅 BUGÜN — {workDate}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

          ["history","📊 Hesabat",isAdmin],
          ["stock","📦 Stok",isAdmin],
          ["expenses","💸 Xərc",isAdmin],
          ["settings","⚙️",isAdmin],
        ].filter(([,,show])=>show).map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)}
            style={{flex:v==="settings"?0:1,padding:v==="settings"?"10px 14px":"10px 6px",background:view===v?"#1e1e2c":"transparent",
              border:"none",borderBottom:view===v?`2px solid ${C.gold}`:"2px solid transparent",
              color:view===v?C.gold:C.muted,fontSize:12,fontWeight:view===v?700:400,cursor:"pointer",whiteSpace:"nowrap"}}>
            {l}
          </button>
        ))}
      </div>

      {view==="tables"&&<>
        <div style={{display:"flex",borderBottom:`1px solid ${C.border}`}}>
          {[["içəri","🏠 İçəri (15)"],["çöl","🌿 Çöl (15)"]].map(([v,l])=>(
            <button key={v} onClick={()=>setLoc(v)}
              style={{flex:1,padding:"9px",background:loc===v?C.gold:"#1e1e2c",border:"none",
                color:loc===v?"#0f0f13":C.muted,fontWeight:loc===v?700:400,fontSize:13,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,padding:14}}>
          {ALL_TABLES.filter(t=>t.loc===loc).map(t=>{
            const orders=(tables[t.id]?.orders||[]).filter(o=>!o.x);
            const hasO=orders.length>0;
            const total=getTotal(t.id);
            const dNum=t.id<=15?t.id:t.id-15;
            return(
              <div key={t.id} onClick={()=>{setSelTable(t.id);setView("detail");}}
                style={{background:hasO?"linear-gradient(145deg,#1c2e1c,#152015)":"#1a1a24",
                  border:`2px solid ${hasO?"#2d5a2d":"#2a2a38"}`,borderRadius:12,
                  padding:"10px 8px",cursor:"pointer",position:"relative",
                  minHeight:80,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:hasO?"#4caf50":"#3a3a50",position:"absolute",top:8,right:8}}/>
                <div style={{fontSize:20,fontWeight:800}}>{dNum}</div>
                <div style={{fontSize:13,fontWeight:700,color:hasO?C.green:"#3a3a50"}}>{hasO?`${total.toFixed(2)} ₼`:"Boş"}</div>
                {hasO&&<div style={{fontSize:10,color:C.muted}}>{orders.length} sifariş</div>}
              </div>
            );
          })}
        </div>
      </>}

      {showDate&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)setShowDate(false);}}>
        <div style={{background:"#1a1a24",borderRadius:"18px 18px 0 0",padding:"20px 16px 30px"}}>
          <div style={{width:36,height:4,background:"#3a3a50",borderRadius:2,margin:"0 auto 16px"}}/>
          <div style={{fontSize:15,fontWeight:700,color:C.gold,marginBottom:12}}>İş günü tarixi</div>
          <input style={{...inp,marginBottom:14}} placeholder="28.05.2026" value={dateInput} onChange={e=>setDateInput(e.target.value)}/>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowDate(false)} style={{flex:1,...btn("#2a2a38",C.text),padding:12}}>Ləğv et</button>
            <button onClick={()=>{if(dateInput){setWorkDate(dateInput);setShowDate(false);}}} style={{flex:1,...btn("linear-gradient(135deg,#2d7a2d,#1f5c1f)","#fff"),padding:12}}>Saxla</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

function MenuRow({item,onAdd}){
  const [qty,setQty]=useState(1);
  const [note,setNote]=useState("");
  const [open,setOpen]=useState(false);
  return(
    <div style={{marginBottom:7}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",padding:"10px 12px",background:"#1e1e2c",borderRadius:open?"10px 10px 0 0":10,border:"1px solid #2a2a38",cursor:"pointer",gap:10}}>
        <div style={{flex:1,fontSize:14}}>{item.name}</div>
        <div style={{fontSize:14,fontWeight:700,color:"#f0c060"}}>{item.price.toFixed(2)}₼</div>
        <span style={{color:"#8888aa",fontSize:13}}>{open?"▲":"▼"}</span>
      </div>
      {open&&<div style={{background:"#12121a",borderRadius:"0 0 10px 10px",padding:"10px 12px",border:"1px solid #2a2a38",borderTop:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{background:"#2a2a38",border:"none",borderRadius:6,color:"#f0ece4",width:34,height:34,fontSize:20,cursor:"pointer"}}>−</button>
          <span style={{fontWeight:700,fontSize:16,minWidth:28,textAlign:"center"}}>{qty}</span>
          <button onClick={()=>setQty(q=>q+1)} style={{background:"#2a2a38",border:"none",borderRadius:6,color:"#f0ece4",width:34,height:34,fontSize:20,cursor:"pointer"}}>+</button>
          <input style={{flex:1,background:"#0f0f13",border:"1px solid #2a2a38",borderRadius:8,color:"#f0ece4",fontSize:13,padding:"8px 10px",outline:"none"}} placeholder="Qeyd..." value={note} onChange={e=>setNote(e.target.value)}/>
        </div>
        <button onClick={()=>{onAdd(item,qty,note);setQty(1);setNote("");setOpen(false);}}
          style={{width:"100%",background:"linear-gradient(135deg,#2d7a2d,#1f5c1f)",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:14,padding:10,cursor:"pointer"}}>
          Əlavə et — {(item.price*qty).toFixed(2)}₼
        </button>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
