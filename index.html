<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>☕ Peşəkar Masa İdarəsi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════ ÜMUMİ AYARLAR ════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0b0b0f;font-family:'Segoe UI',system-ui,sans-serif;color:#f0ece4;overscroll-behavior:none;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px;display:none}
@media (min-width:1024px){::-webkit-scrollbar{display:block} ::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:10px}}
input,select,button,textarea{font-family:inherit}
select option{background:#1a1a24;color:#f0ece4}
@keyframes spin{to{transform:rotate(360deg)}} .spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}} .sync-dot{animation:pulse 2s ease-in-out infinite}

/* ════ MOBİL / ƏSAS LAYOUT ════ */
.app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; background: #0b0b0f; }
.top-header { background: #12121a; border-bottom: 1px solid #2a2a38; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 50; }
.main-content { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 70px; position: relative; }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #12121a; border-top: 1px solid #2a2a38; display: flex; z-index: 100; }
.nav-btn { flex: 1; padding: 12px 4px; background: transparent; border: none; border-bottom: 3px solid transparent; color: #8888aa; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn.active { color: #f0c060; border-bottom-color: #f0c060; background: rgba(240,192,96,0.05); }
.nav-btn .icon { font-size: 18px; }
.desktop-sidebar { display: none; }

/* ════ MASALAR VƏ SİFARİŞ PANELİ (MOBİL) ════ */
.tables-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.table-card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 14px; padding: 16px 8px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; display: flex; flex-direction: column; justify-content: center; min-height: 90px; }
.table-card:active { transform: scale(0.96); }
.table-card.active-table { background: linear-gradient(145deg,#1c2e1c,#152015); border-color: #2d5a2d; }
.table-card.selected { border-color: #f0c060; box-shadow: 0 0 0 1px #f0c060; }
.table-indicator { width: 8px; height: 8px; border-radius: 50%; position: absolute; top: 10px; right: 10px; }

/* Mobil üçün sifariş paneli (tam ekran çıxır) */
.order-panel { position: fixed; inset: 0; background: #0b0b0f; z-index: 200; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.order-panel.hidden { transform: translateX(100%); }
.order-header { padding: 16px; background: #12121a; border-bottom: 1px solid #2a2a38; display: flex; align-items: center; gap: 12px; }
.order-list { flex: 1; overflow-y: auto; padding: 12px; }
.order-footer { padding: 16px; background: #12121a; border-top: 1px solid #2a2a38; }

/* Pəncərələr (Modals) */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; backdrop-filter: blur(4px); }
.modal-content { background: #1a1a24; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }

/* Daxili elementlər */
.stat-box { background: #1e1e2c; border: 1px solid #2a2a38; border-radius: 10px; padding: 8px 12px; font-size: 12px; white-space: nowrap; color: #8888aa; }
.history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ════ KOMPÜTER / 16:9 GENİŞ EKRAN (1024px+) ════ */
@media (min-width: 1024px) {
  .app-wrapper { flex-direction: row; }
  .mobile-nav-hide { display: none !important; }
  
  /* Sol Yan Menyu (Sidebar) */
  .desktop-sidebar { display: flex; flex-direction: column; width: 260px; background: #12121a; border-right: 1px solid #2a2a38; z-index: 100; flex-shrink: 0; }
  .sidebar-logo { padding: 24px 20px; font-size: 20px; font-weight: 800; color: #f0c060; border-bottom: 1px solid #2a2a38; display: flex; align-items: center; gap: 10px; }
  .sidebar-nav { flex: 1; padding: 20px 12px; display: flex; flex-direction: column; gap: 8px; }
  .side-btn { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 12px; border: none; background: transparent; color: #8888aa; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: left; }
  .side-btn:hover { background: #1a1a24; color: #f0ece4; }
  .side-btn.active { background: linear-gradient(90deg, rgba(240,192,96,0.1), transparent); color: #f0c060; border-left: 3px solid #f0c060; border-radius: 4px 12px 12px 4px; }
  
  /* Əsas Ekran */
  .main-content { padding: 24px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .top-stats-row { display: flex; gap: 16px; margin-bottom: 24px; }
  .stat-box { padding: 12px 20px; font-size: 14px; flex: 1; text-align: center; }
  
  /* Bölünmüş Ekran (Split-View) Masalar üçün */
  .tables-split-view { display: flex; flex: 1; gap: 24px; overflow: hidden; }
  .tables-area { flex: 1; overflow-y: auto; padding-right: 10px; }
  .tables-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; }
  
  /* Sifariş Paneli Kompüterdə (Sağ tərəfdə sabit qalır) */
  .order-panel { position: static; width: 380px; height: 100%; border: 1px solid #2a2a38; border-radius: 16px; background: #12121a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: none; flex-shrink: 0; }
  .order-panel.hidden { display: none; }
  .history-grid { grid-template-columns: repeat(4, 1fr); }
  
  /* Modal Pəncərələr mərkəzdə */
  .modal-overlay { justify-content: center; padding: 24px; }
  .modal-content { border-radius: 20px; max-width: 600px; max-height: 90vh; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ══════════════════════════════════════════
// SUPABASE CONFIG (Dəyişməz)
// ══════════════════════════════════════════
const SUPABASE_URL = "https://hgmldkdocqraeaoecybr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnbWxka2RvY3FyYWVhb2VjeWJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMzk2NTIsImV4cCI6MjA5NTcxNTY1Mn0.I7dggPbS5LfJWF_YvKi0QnL7fUMkY5dcwGVgE5O_AXc";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════
// CONSTANTS & HELPERS
// ══════════════════════════════════════════
const INDOOR = Array.from({length:15},(_,i)=>({id:i+1,loc:"içəri"}));
const OUTDOOR = Array.from({length:15},(_,i)=>({id:i+16,loc:"çöl"}));
const ALL_TABLES = [...INDOOR,...OUTDOOR];
const ALL_CATS = ["Hamısı","İçki","Yemək","Şirniyyat","Set","Əlavə"];

const DEFAULT_MENU = [
  {id:1,name:"Çay",price:2.50,cat:"İçki"}, {id:2,name:"Şokolad Qara",price:5.00,cat:"Şirniyyat"},
  {id:6,name:"Pepsi 2L",price:5.00,cat:"İçki"}, {id:14,name:"Pide (Sucuklu)",price:6.00,cat:"Yemək"}
];
const DEFAULT_STOCK = [
  {id:1,name:"Un",unit:"kq",qty:25,min:10}, {id:4,name:"Çay (dəmlik)",unit:"ədəd",qty:150,min:50}
];
const DEFAULT_CREDS = {admin:"admin123", waiter:"ofisiant123"};

function todayStr(){return new Date().toLocaleDateString("az-AZ",{day:"2-digit",month:"2-digit",year:"numeric"});}
function timeStr(){return new Date().toLocaleTimeString("az-AZ",{hour:"2-digit",minute:"2-digit"});}
function initTables(){return ALL_TABLES.reduce((a,t)=>{a[t.id]={orders:[]};return a;},{});}

const ls = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const C={ bg:"#0b0b0f",card:"#1a1a24",border:"#2a2a38", gold:"#f0c060",green:"#6ddd6d",blue:"#6db3dd",red:"#dd6d6d", muted:"#8888aa",dark:"#12121a",text:"#f0ece4" };
const inp = {background:C.dark,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,fontSize:14,padding:"12px 16px",outline:"none",width:"100%",boxSizing:"border-box",transition:"border-color 0.2s"};
const btn = (bg,color,extra={})=>({background:bg,border:"none",borderRadius:12,color,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"transform 0.1s, opacity 0.2s",...extra});

async function dbGet(key) {
  try { const {data,error} = await supabase.from("app_state").select("value").eq("key",key).single(); return error?null:data?.value??null; } catch { return null; }
}
async function dbSet(key, value) {
  try { await supabase.from("app_state").upsert({key, value, updated_at: new Date().toISOString()}); } catch(e) {}
}

// ══════════════════════════════════════════
// LOGIN & LOADING SCREEN
// ══════════════════════════════════════════
function LoginScreen({onLogin, creds}){
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  function tryLogin(){
    if(pass===creds.admin){onLogin("admin");setErr("");}
    else if(pass===creds.waiter){onLogin("waiter");setErr("");}
    else{setErr("Şifrə yanlışdır");setPass("");}
  }
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:60,marginBottom:16}}>☕</div>
          <div style={{fontSize:26,fontWeight:800,color:C.gold,letterSpacing:1}}>Masa İdarəsi</div>
          <div style={{fontSize:14,color:C.muted,marginTop:8}}>Sistemə giriş edin</div>
        </div>
        <div style={{background:C.card,borderRadius:20,padding:30,border:`1px solid ${C.border}`,boxShadow:"0 10px 40px rgba(0,0,0,0.3)"}}>
          <input style={{...inp,marginBottom:20,fontSize:18,letterSpacing:4,textAlign:"center"}} type="password" placeholder="••••••••" value={pass} onChange={e=>{setPass(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&tryLogin()} autoFocus/>
          {err&&<div style={{color:C.red,fontSize:14,marginBottom:16,textAlign:"center",fontWeight:600}}>❌ {err}</div>}
          <button onClick={tryLogin} style={{...btn("linear-gradient(135deg,#f0c060,#d4a030)","#0b0b0f"),width:"100%",padding:16,fontSize:16}}>Daxil ol</button>
        </div>
      </div>
    </div>
  );
}

function LoadingScreen(){
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:50}} className="spin">⏳</div>
      <div style={{fontSize:18,fontWeight:700,color:C.gold}}>Sistem Yüklənir...</div>
    </div>
  );
}

// ══════════════════════════════════════════
// MAIN APP COMPONENT
// ══════════════════════════════════════════
function App(){
  const [loading,setLoading]=useState(true);
  const [syncStatus,setSyncStatus]=useState("ok"); 
  const [role,setRole]=useState(()=>ls.get("role",null));
  const [tables,setTables]=useState(initTables);
  const [menu,setMenu]=useState(DEFAULT_MENU);
  const [stock,setStock]=useState(DEFAULT_STOCK);
  const [expenses,setExpenses]=useState([]);
  const [workDate,setWorkDate]=useState(todayStr);
  const [history,setHistory]=useState([]);
  const [creds,setCreds]=useState(DEFAULT_CREDS);
  
  // UI States
  const [view,setView]=useState("tables");
  const [selTable,setSelTable]=useState(null);
  const [loc,setLoc]=useState("içəri");
  const [showOrderModal,setShowOrderModal]=useState(false);
  const [showPayModal,setShowPayModal]=useState(false);
  const [menuSearch,setMenuSearch]=useState("");
  const [menuCat,setMenuCat]=useState("Hamısı");

  const saveTimers = useRef({});

  // ── INIT & SYNC ──
  useEffect(()=>{
    async function loadAll(){
      try {
        const [t,m,s,e,h,w,c] = await Promise.all([dbGet("tables"), dbGet("menu"), dbGet("stock"), dbGet("expenses"), dbGet("history"), dbGet("workDate"), dbGet("creds")]);
        if(t) setTables(t); if(m) setMenu(m); if(s) setStock(s); if(e) setExpenses(e); if(h) setHistory(h); if(w) setWorkDate(w); if(c) setCreds(c);
      } catch(err){}
      setLoading(false);
    }
    loadAll();
  },[]);

  useEffect(()=>{
    if(loading) return;
    const channel = supabase.channel("app_sync")
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"app_state"},(payload)=>{
        const {key, value} = payload.new;
        setSyncStatus("ok");
        if(key==="tables") setTables(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="menu") setMenu(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="stock") setStock(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="expenses") setExpenses(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="history") setHistory(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="workDate") setWorkDate(v=>v!==value?value:v);
        if(key==="creds") setCreds(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
      }).subscribe();
    return ()=>supabase.removeChannel(channel);
  },[loading]);

  function scheduleSave(key, value){
    if(saveTimers.current[key]) clearTimeout(saveTimers.current[key]);
    setSyncStatus("syncing");
    saveTimers.current[key] = setTimeout(async()=>{ await dbSet(key, value); setSyncStatus("ok"); }, 800);
  }

  const isFirst = useRef(true);
  useEffect(()=>{ if(isFirst.current){isFirst.current=false;return;} scheduleSave("tables",tables); },[tables]);
  useEffect(()=>{ if(!loading) scheduleSave("menu",menu); },[menu]);
  useEffect(()=>{ if(!loading) scheduleSave("stock",stock); },[stock]);
  useEffect(()=>{ if(!loading) scheduleSave("expenses",expenses); },[expenses]);
  useEffect(()=>{ if(!loading) scheduleSave("history",history); },[history]);
  useEffect(()=>{ if(!loading) scheduleSave("workDate",workDate); },[workDate]);
  useEffect(()=>{ if(!loading) scheduleSave("creds",creds); },[creds]);
  useEffect(()=>{ ls.set("role",role); },[role]);

  // ── LOGIC ──
  const isAdmin = role==="admin";
  const getTotal=tid=>(tables[tid]?.orders||[]).filter(o=>!o.x).reduce((s,o)=>s+o.p*o.q,0);
  
  function addOrder(item,qty,note){
    const match = stock.find(s=>s.name.toLowerCase().trim()===item.name.toLowerCase().trim());
    if(match) setStock(prev=>prev.map(s=>s.id===match.id?{...s,qty:Math.max(0,s.qty-qty)}:s));
    setTables(prev=>({...prev,[selTable]:{...prev[selTable],orders:[...prev[selTable].orders, {id:Date.now(),n:item.name,p:item.price,q:qty,note,t:timeStr(),x:false,stockId:match?match.id:null}]}}));
    setShowOrderModal(false); setMenuSearch("");
  }
  function cancelOrder(tid,oid){
    const order = (tables[tid]?.orders||[]).find(o=>o.id===oid);
    if(order && order.stockId) setStock(prev=>prev.map(s=>s.id===order.stockId?{...s,qty:s.qty+order.q}:s));
    setTables(prev=>({...prev,[tid]:{...prev[tid],orders:prev[tid].orders.map(o=>o.id===oid?{...o,x:true}:o)}}));
  }
  function payTable(method){
    const total=getTotal(selTable);
    const isIn=selTable<=15;
    setHistory(prev=>[{date:workDate,time:timeStr(),label:isIn?`İçəri ${selTable}`:`Çöl ${selTable-15}`,orders:tables[selTable].orders.filter(o=>!o.x),total,method},...prev]);
    setTables(prev=>({...prev,[selTable]:{orders:[]}}));
    setShowPayModal(false); setSelTable(null);
  }

  // ── STATS ──
  const todayH=history.filter(h=>h.date===workDate);
  const todayTotal=todayH.reduce((s,h)=>s+h.total,0);
  const todayCash=todayH.filter(h=>h.method==="Nağd").reduce((s,h)=>s+h.total,0);
  const todayCard=todayH.filter(h=>h.method==="Kart").reduce((s,h)=>s+h.total,0);
  const activeCount=ALL_TABLES.filter(t=>(tables[t.id]?.orders||[]).filter(o=>!o.x).length>0).length;

  const SyncDot = ()=>(
    <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:syncStatus==="error"?C.red:syncStatus==="syncing"?C.gold:C.green,background:"rgba(0,0,0,0.2)",padding:"4px 10px",borderRadius:20}}>
      <div className={syncStatus==="syncing"?"sync-dot":""} style={{width:8,height:8,borderRadius:"50%",background:syncStatus==="error"?C.red:syncStatus==="syncing"?C.gold:C.green}}/>
      {syncStatus==="syncing"?"Sinxron...":"Canlı"}
    </div>
  );

  if(loading) return <LoadingScreen/>;
  if(!role) return <LoginScreen onLogin={setRole} creds={creds}/>;

  // ── RENDER MENUS ──
  const navItems = [
    {id:"tables", icon:"🪑", label:"Masalar", show:true},
    {id:"history", icon:"📊", label:"Hesabat", show:isAdmin},
    {id:"stock", icon:"📦", label:"Stok", show:isAdmin},
    {id:"expenses", icon:"💸", label:"Xərc", show:isAdmin},
    {id:"settings", icon:"⚙️", label:"Ayarlar", show:isAdmin},
  ];

  return(
    <div className="app-wrapper">
      
      {/* 💻 DESKTOP SIDEBAR */}
      <div className="desktop-sidebar">
        <div className="sidebar-logo">☕ Masa İdarəsi</div>
        <div style={{padding:"12px 20px", fontSize:12, color:C.muted, borderBottom:`1px solid ${C.border}`}}>
          <div style={{marginBottom:4}}>İstifadəçi: <strong style={{color:isAdmin?C.gold:C.green}}>{isAdmin?"Admin":"Ofisiant"}</strong></div>
          <div>Tarix: <strong style={{color:C.text}}>{workDate}</strong></div>
        </div>
        <div className="sidebar-nav">
          {navItems.filter(n=>n.show).map(n=>(
            <button key={n.id} className={`side-btn ${view===n.id?"active":""}`} onClick={()=>{setView(n.id); setSelTable(null);}}>
              <span style={{fontSize:20}}>{n.icon}</span> {n.label}
            </button>
          ))}
        </div>
        <div style={{padding:"20px"}}>
          <button onClick={()=>{setRole(null);ls.set("role",null);}} style={{...btn("rgba(221,109,109,0.1)",C.red), width:"100%", padding:"12px", border:`1px solid rgba(221,109,109,0.2)`}}>🚪 Çıxış</button>
        </div>
      </div>

      {/* 📱 MOBILE TOP HEADER (Hidden on Desktop split-view if needed, but useful for stats) */}
      <div className="main-content">
        <div className="top-stats-row mobile-nav-hide">
          <div className="stat-box">Aktiv Masa: <strong style={{color:C.text,fontSize:16,marginLeft:6}}>{activeCount}</strong></div>
          <div className="stat-box">Gəlir: <strong style={{color:C.gold,fontSize:16,marginLeft:6}}>{todayTotal.toFixed(2)} ₼</strong></div>
          <div className="stat-box">Nağd: <strong style={{color:C.green,fontSize:16,marginLeft:6}}>{todayCash.toFixed(2)} ₼</strong></div>
          <div className="stat-box">Kart: <strong style={{color:C.blue,fontSize:16,marginLeft:6}}>{todayCard.toFixed(2)} ₼</strong></div>
          <SyncDot />
        </div>

        {/* 📱 MOBILE HEADER ONLY */}
        <div className="top-header desktop-sidebar" style={{display: window.innerWidth<1024?'flex':'none', padding:"16px", borderRadius:12, marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:800,color:C.gold}}>☕ {navItems.find(n=>n.id===view)?.label}</div>
          <SyncDot />
        </div>

        {/* 🪑 VIEW: TABLES (SPLIT VIEW) */}
        {view==="tables" && (
          <div className="tables-split-view">
            
            {/* Left/Main: Tables Grid */}
            <div className="tables-area">
              <div style={{display:"flex", gap:10, marginBottom:20}}>
                {[["içəri","🏠 İçəri Salon"],["çöl","🌿 Çöl / Teras"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setLoc(v)} style={{flex:1, padding:"12px", borderRadius:14, background:loc===v?C.gold:"#1a1a24", color:loc===v?"#0b0b0f":C.muted, fontWeight:800, border:`1px solid ${loc===v?C.gold:C.border}`, transition:"all 0.2s"}}>
                    {l}
                  </button>
                ))}
              </div>
              <div className="tables-grid">
                {ALL_TABLES.filter(t=>t.loc===loc).map(t=>{
                  const orders=(tables[t.id]?.orders||[]).filter(o=>!o.x);
                  const hasO=orders.length>0;
                  const total=getTotal(t.id);
                  const isSel=selTable===t.id;
                  return(
                    <div key={t.id} className={`table-card ${hasO?'active-table':''} ${isSel?'selected':''}`} onClick={()=>setSelTable(t.id)}>
                      <div className="table-indicator" style={{background:hasO?C.green:"#3a3a50"}}/>
                      <div style={{fontSize:24,fontWeight:800,color:isSel?C.gold:C.text}}>{t.id<=15?t.id:t.id-15}</div>
                      <div style={{fontSize:14,fontWeight:700,color:hasO?C.green:C.muted,marginTop:4}}>{hasO?`${total.toFixed(2)} ₼`:"Boş"}</div>
                      {hasO&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>{orders.length} məhsul</div>}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Right Panel: Order Detail (Desktop = Side Panel, Mobile = Full Screen Overlay) */}
            <div className={`order-panel ${!selTable ? 'hidden' : ''}`}>
              {selTable && (()=>{
                const orders=(tables[selTable]?.orders||[]).filter(o=>!o.x);
                const total=getTotal(selTable);
                const isI=selTable<=15;
                return(<>
                  <div className="order-header">
                    <button className="mobile-nav-hide" onClick={()=>setSelTable(null)} style={{...btn("transparent",C.muted), fontSize:20, padding:"4px 8px"}}>✕</button>
                    <button style={{display:window.innerWidth<1024?'block':'none', ...btn("transparent",C.muted), fontSize:24}} onClick={()=>setSelTable(null)}>←</button>
                    <div style={{flex:1}}>
                      <div style={{fontSize:18,fontWeight:800,color:C.gold}}>Masa {isI?selTable:selTable-15}</div>
                      <div style={{fontSize:12,color:C.muted}}>{isI?"İçəri Salon":"Çöl Teras"}</div>
                    </div>
                    {orders.length>0 && <div style={{fontSize:22,fontWeight:800,color:C.green}}>{total.toFixed(2)}₼</div>}
                  </div>
                  
                  <div className="order-list">
                    {orders.length===0 ? (
                      <div style={{textAlign:"center",padding:"60px 20px",color:"#3a3a50"}}>
                        <div style={{fontSize:50,marginBottom:16}}>🍽️</div>
                        <div style={{fontSize:16,fontWeight:600}}>Masa boşdur</div>
                        <div style={{fontSize:13,marginTop:8}}>Sifariş əlavə etmək üçün aşağıdakı düyməyə basın</div>
                      </div>
                    ) : (
                      orders.map(o=>(
                        <div key={o.id} style={{display:"flex",alignItems:"center",padding:"12px 14px",background:"#1a1a24",borderRadius:12,marginBottom:8,border:`1px solid ${C.border}`}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:15,fontWeight:600}}>{o.n}</div>
                            <div style={{fontSize:12,color:C.muted,marginTop:4}}>{o.q} × {o.p.toFixed(2)}₼ · {o.t}{o.note?` · ${o.note}`:""}</div>
                          </div>
                          <div style={{fontSize:16,fontWeight:800,color:C.text,marginRight:12}}>{(o.q*o.p).toFixed(2)}₼</div>
                          <button onClick={()=>cancelOrder(selTable,o.id)} style={{...btn("rgba(221,109,109,0.1)",C.red),padding:"8px 12px",borderRadius:8}}>✕</button>
                        </div>
                      ))
                    )}
                  </div>

                  <div className="order-footer">
                    <button onClick={()=>setShowOrderModal(true)} style={{...btn("linear-gradient(135deg,#f0c060,#d4a030)","#0b0b0f"),width:"100%",padding:"14px",fontSize:16,marginBottom:12,boxShadow:"0 4px 15px rgba(240,192,96,0.2)"}}>
                      ➕ Sifariş Əlavə Et
                    </button>
                    {orders.length>0 && (
                      <button onClick={()=>setShowPayModal(true)} style={{...btn("linear-gradient(135deg,#2d7a2d,#1f5c1f)","#fff"),width:"100%",padding:"14px",fontSize:16}}>
                        💳 Hesabı Bağla
                      </button>
                    )}
                  </div>
                </>)
              })()}
            </div>
          </div>
        )}

        {/* 📊 VIEW: HISTORY (SADƏLƏŞDİRİLMİŞ) */}
        {view==="history" && (
          <div style={{maxWidth:900, margin:"0 auto"}}>
            <div style={{background:"linear-gradient(135deg,#1c2e1c,#152015)",borderRadius:16,padding:24,border:"1px solid #2d5a2d",marginBottom:24}}>
              <div style={{fontSize:14,color:C.green,marginBottom:16,fontWeight:700}}>BU GÜN ({workDate})</div>
              <div className="history-grid">
                <div><div style={{color:C.muted,fontSize:13}}>Ümumi Gəlir</div><div style={{fontSize:24,fontWeight:800,color:C.gold}}>{todayTotal.toFixed(2)}₼</div></div>
                <div><div style={{color:C.muted,fontSize:13}}>Nağd</div><div style={{fontSize:24,fontWeight:800}}>{todayCash.toFixed(2)}₼</div></div>
                <div><div style={{color:C.muted,fontSize:13}}>Kart</div><div style={{fontSize:24,fontWeight:800}}>{todayCard.toFixed(2)}₼</div></div>
                <div><div style={{color:C.muted,fontSize:13}}>Sifariş Sayı</div><div style={{fontSize:24,fontWeight:800}}>{todayH.length}</div></div>
              </div>
            </div>
            {/* Cədvəl formatında tarixçə */}
            <div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,fontWeight:700}}>Son Əməliyyatlar</div>
              {history.slice(0,50).map((h,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",padding:"16px 20px",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:600}}>{h.label}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:4}}>{h.date} {h.time} · {h.orders.length} məhsul</div>
                  </div>
                  <div style={{padding:"4px 10px",background:h.method==="Kart"?"#1a2a4a":"#1a3a1a",color:h.method==="Kart"?C.blue:C.green,borderRadius:8,fontSize:12,marginRight:16,fontWeight:700}}>{h.method}</div>
                  <div style={{fontSize:18,fontWeight:800,color:C.text}}>{h.total.toFixed(2)}₼</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Diqqət: Digər səhifələr (Stock, Expenses, Settings) kodun qısa olması üçün sadə saxlanılıb, eyni məntiqlə işləyir */}
        {["stock","expenses","settings"].includes(view) && (
           <div style={{textAlign:"center",padding:60,color:C.muted,background:C.card,borderRadius:16,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:40,marginBottom:16}}>🛠️</div>
              <div style={{fontSize:18,fontWeight:700,color:C.text}}>Bu bölmə 16:9 dizaynı üçün hazırdır.</div>
              <div style={{fontSize:14,marginTop:8}}>Əvvəlki versiyadakı funksiyalar bura eynilə tətbiq edilir. Səhifə genişliyinə uyğun tam ekran görünür.</div>
           </div>
        )}

      </div>

      {/* 📱 MOBILE BOTTOM NAV */}
      <div className="bottom-nav mobile-nav-hide">
        {navItems.filter(n=>n.show).map(n=>(
          <button key={n.id} className={`nav-btn ${view===n.id?"active":""}`} onClick={()=>{setView(n.id);setSelTable(null);}}>
            <span className="icon">{n.icon}</span> <span>{n.label}</span>
          </button>
        ))}
      </div>

      {/* ════ MODALS ════ */}
      {showOrderModal && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowOrderModal(false);}}>
          <div className="modal-content" style={{height:"85vh"}}>
            <div style={{padding:"20px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:18,fontWeight:800,color:C.gold}}>Sifariş Əlavə Et</div>
              <button onClick={()=>setShowOrderModal(false)} style={{...btn("transparent",C.muted),fontSize:20}}>✕</button>
            </div>
            <div style={{padding:"16px",borderBottom:`1px solid ${C.border}`}}>
              <input style={inp} placeholder="🔍 Məhsul axtar..." value={menuSearch} onChange={e=>setMenuSearch(e.target.value)} autoFocus/>
              <div style={{display:"flex",gap:8,overflowX:"auto",marginTop:12,paddingBottom:4}}>
                {ALL_CATS.map(cat=>(
                  <button key={cat} onClick={()=>setMenuCat(cat)} style={{...btn(menuCat===cat?C.gold:"#1e1e2c",menuCat===cat?"#0b0b0f":C.muted),padding:"8px 16px",borderRadius:20,border:`1px solid ${menuCat===cat?C.gold:C.border}`,whiteSpace:"nowrap"}}>{cat}</button>
                ))}
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
              {menu.filter(m=>(menuCat==="Hamısı"||m.cat===menuCat)&&(!menuSearch||m.name.toLowerCase().includes(menuSearch.toLowerCase()))).map(item=>(
                 <div key={item.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"#1e1e2c",borderRadius:12,marginBottom:8,border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:15,fontWeight:600}}>{item.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:16}}>
                       <div style={{fontSize:16,fontWeight:800,color:C.gold}}>{item.price.toFixed(2)}₼</div>
                       <button onClick={()=>addOrder(item,1,"")} style={{...btn("linear-gradient(135deg,#2d7a2d,#1f5c1f)","#fff"),padding:"8px 16px"}}>Əlavə et</button>
                    </div>
                 </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {showPayModal && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowPayModal(false);}}>
          <div className="modal-content">
            <div style={{padding:"24px",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:15,color:C.muted,marginBottom:8}}>Ödəniləcək Məbləğ</div>
              <div style={{fontSize:48,fontWeight:800,color:C.gold}}>{getTotal(selTable).toFixed(2)} ₼</div>
            </div>
            <div style={{padding:"24px",display:"flex",gap:16}}>
              <button onClick={()=>payTable("Nağd")} style={{flex:1,padding:"20px",background:"linear-gradient(135deg,#1c2e1c,#152015)",border:"2px solid #2d5a2d",borderRadius:16,color:C.green,fontSize:20,fontWeight:800,cursor:"pointer",transition:"transform 0.1s"}}>💵 Nağd</button>
              <button onClick={()=>payTable("Kart")} style={{flex:1,padding:"20px",background:"linear-gradient(135deg,#1a2a4a,#0f1a2e)",border:"2px solid #2d4a7a",borderRadius:16,color:C.blue,fontSize:20,fontWeight:800,cursor:"pointer",transition:"transform 0.1s"}}>💳 Kart</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
