// Work date logic: if current time is before 06:00, use previous day as work date
function getWorkDate(){
  const now = new Date();
  if(now.getHours() < 6){
    const prev = new Date(now);
    prev.setDate(prev.getDate()-1);
    return prev.toLocaleDateString("az-AZ",{day:"2-digit",month:"2-digit",year:"numeric"});
  }
  return now.toLocaleDateString("az-AZ",{day:"2-digit",month:"2-digit",year:"numeric"});
}

async function dbGet(key) {

// ── STOCK DEDUCTION HELPER ──
function applyStockRules(itemName, itemQty, stockArr) {
  let newStock = [...stockArr];
  const nameLower = itemName.toLowerCase().trim();

  // Burger rule
  if(nameLower.includes("burger")){
    newStock = newStock.map(s=>{
      if(s.name.toLowerCase().includes("baton çörək")||s.name.toLowerCase().includes("burger çörəyi")){
        return {...s, qty:Math.max(0, s.qty - itemQty)};
      }
      return s;
    });
  }
  // Set 11 rule
  if(nameLower === "set 11"){
    newStock = newStock.map(s=>{
      const sn = s.name.toLowerCase();
      if(sn === "pepsi 1l") return {...s, qty:Math.max(0, s.qty - itemQty)};
      if(sn === "tost") return {...s, qty:Math.max(0, s.qty - 2*itemQty)};
      return s;
    });
  }
  // Set 16 rule
  if(nameLower === "set 16"){
    newStock = newStock.map(s=>{
      const sn = s.name.toLowerCase();
      if(sn === "pepsi 2.25l") return {...s, qty:Math.max(0, s.qty - itemQty)};
      return s;
    });
  }
  return newStock;
}

// Reverse stock rules on cancel
function reverseStockRules(itemName, itemQty, stockArr) {
  let newStock = [...stockArr];
  const nameLower = itemName.toLowerCase().trim();
  if(nameLower.includes("burger")){
    newStock = newStock.map(s=>{
      if(s.name.toLowerCase().includes("baton çörək")||s.name.toLowerCase().includes("burger çörəyi")){
        return {...s, qty: s.qty + itemQty};
      }
      return s;
    });
  }
  if(nameLower === "set 11"){
    newStock = newStock.map(s=>{
      const sn = s.name.toLowerCase();
      if(sn === "pepsi 1l") return {...s, qty: s.qty + itemQty};
      if(sn === "tost") return {...s, qty: s.qty + 2*itemQty};
      return s;
    });
  }
  if(nameLower === "set 16"){
    newStock = newStock.map(s=>{
      const sn = s.name.toLowerCase();
      if(sn === "pepsi 2.25l") return {...s, qty: s.qty + itemQty};
      return s;
    });
  }
  return newStock;
}

function MenuRow({item, onAdd, stock, setsConfig}){
  const [qty,setQty]=useState(1);
  const [note,setNote]=useState("");
  const [open,setOpen]=useState(false);
  const [selectedDrink,setSelectedDrink]=useState(null);

  const stockItem = stock ? stock.find(s=>s.name.toLowerCase().trim()===item.name.toLowerCase().trim()) : null;
  const outOfStock = stockItem && stockItem.qty===0;

  // Check if this item has drink options (sets)
  const setConf = setsConfig ? setsConfig.find(sc=>sc.name.toLowerCase()===item.name.toLowerCase()) : null;

  useEffect(()=>{
    if(setConf && !selectedDrink) setSelectedDrink(setConf.defaultDrink);
  },[setConf]);

  function handleAdd(){
    onAdd(item, qty, note, selectedDrink);
    setQty(1); setNote(""); setOpen(false);
  }

  return(
    <div style={{marginBottom:8,opacity:outOfStock?0.5:1}} className="fade-in">
      <div onClick={()=>!outOfStock&&setOpen(!open)}
        style={{display:"flex",alignItems:"center",padding:"12px 14px",
          background:open?"#1e1e30":C.card,
          borderRadius:open?"14px 14px 0 0":14,
          border:`1px solid ${open?C.border+"80":C.border}`,
          cursor:outOfStock?"not-allowed":"pointer",gap:10,
          transition:"all 0.15s"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:500}}>{item.name}
            {outOfStock&&<span style={{fontSize:11,color:C.red,marginLeft:6,fontWeight:400}}>· bitmişdir</span>}
          </div>
          {setConf&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Set məhsulu</div>}
        </div>
        {stockItem&&!outOfStock&&(
          <span style={{fontSize:10,color:C.green,background:"rgba(86,204,122,0.1)",borderRadius:8,padding:"2px 8px",border:"1px solid rgba(86,204,122,0.2)"}}>
            {stockItem.qty} {stockItem.unit}
          </span>
        )}
        <div style={{fontSize:14,fontWeight:700,color:C.gold}}>{item.price.toFixed(2)}₼</div>
        <span style={{color:C.muted,fontSize:10,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
      </div>
      {open&&(
        <div style={{background:C.dark,borderRadius:"0 0 14px 14px",padding:"12px 14px",border:`1px solid ${C.border}`,borderTop:"none"}}>
          {setConf && setConf.drinkOptions.length>0 && (
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:500}}>İçki seçimi</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {setConf.drinkOptions.map(d=>(
                  <button key={d} onClick={()=>setSelectedDrink(d)}
                    style={{...btn(selectedDrink===d?C.gold:"rgba(255,255,255,0.05)",selectedDrink===d?"#0a0a0f":C.textSub),
                      fontSize:11,padding:"5px 10px",borderRadius:8,
                      border:`1px solid ${selectedDrink===d?C.gold:C.border}`}}>
                    {d}
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <button onClick={()=>setQty(q=>Math.max(1,q-1))}
              style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,borderRadius:10,color:C.text,width:36,height:36,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>

  const [editExp,setEditExp]=useState(null); // {id, desc, amount, method, cat}
  const [pwForm,setPwForm]=useState({adminPw:"",waiterPw:""});
  const [pwMsg,setPwMsg]=useState("");
  const [newSetForm,setNewSetForm]=useState({name:"",price:"",defaultDrink:"",drinkOptions:"",extras:""});

  const saveTimers = useRef({});

  // ── LOAD FROM SUPABASE ──
  useEffect(()=>{
    async function loadAll(){
      setLoading(true);
      try {
        const [t,m,s,e,h,w,c,sc] = await Promise.all([
          dbGet("tables"), dbGet("menu"), dbGet("stock"),
          dbGet("expenses"), dbGet("history"), dbGet("workDate"), dbGet("creds"), dbGet("setsConfig")
        ]);
        if(t) setTables(t);
        if(m) setMenu(m);
        if(s) setStock(s);
        if(e) setExpenses(e);
        if(h) setHistory(h);
        if(w) setWorkDate(w);
        if(c) setCreds(c);
        if(sc) setSetsConfig(sc);
      } catch(err){ console.error("Load error:",err); }
      setLoading(false);
    }
    loadAll();
  },[]);

  // ── REAL-TIME SUBSCRIPTION ──
  useEffect(()=>{
    if(loading) return;
    const channel = supabase
      .channel("app_state_changes")
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"app_state"},(payload)=>{
        const {key, value} = payload.new;
        setSyncStatus("ok");
        if(key==="tables") setTables(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="menu") setMenu(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="stock") setStock(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="expenses") setExpenses(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="history") setHistory(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="workDate") setWorkDate(v=>v!==value?value:v);
        if(key==="creds") setCreds(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
        if(key==="setsConfig") setSetsConfig(v=>JSON.stringify(v)!==JSON.stringify(value)?value:v);
      })
      .subscribe();
    return ()=>{ supabase.removeChannel(channel); };
  },[loading]);

  // ── DEBOUNCED SAVE ──
  function scheduleSave(key, value, delay=600){
    if(saveTimers.current[key]) clearTimeout(saveTimers.current[key]);
    setSyncStatus("syncing");
    saveTimers.current[key] = setTimeout(async()=>{
      await dbSet(key, value);
      setSyncStatus("ok");
    }, delay);
  }

  const isFirstRender = useRef(true);
  useEffect(()=>{ if(isFirstRender.current){isFirstRender.current=false;return;} scheduleSave("tables",tables); },[tables]);
  useEffect(()=>{ if(!loading) scheduleSave("menu",menu); },[menu]);
  useEffect(()=>{ if(!loading) scheduleSave("stock",stock); },[stock]);
  useEffect(()=>{ if(!loading) scheduleSave("expenses",expenses); },[expenses]);
  useEffect(()=>{ if(!loading) scheduleSave("history",history); },[history]);
  useEffect(()=>{ if(!loading) scheduleSave("workDate",workDate); },[workDate]);
  useEffect(()=>{ if(!loading) scheduleSave("creds",creds); },[creds]);
  useEffect(()=>{ if(!loading) scheduleSave("setsConfig",setsConfig); },[setsConfig]);
  useEffect(()=>{ ls.set("role",role); },[role]);

  function logout(){ setRole(null); ls.set("role",null); setView("tables"); }

  const getTotal = tid => (tables[tid]?.orders||[]).filter(o=>!o.x).reduce((s,o)=>s+o.p*o.q,0);

  // ── ADD ORDER ──
  function addOrder(item, qty, note, selectedDrink){
    // Apply stock rules
    let newStockArr = applyStockRules(item.name, qty, stock);
    // Also deduct direct stock match
    const directMatch = newStockArr.find(s=>s.name.toLowerCase().trim()===item.name.toLowerCase().trim());
    if(directMatch){
      newStockArr = newStockArr.map(s=>s.id===directMatch.id?{...s,qty:Math.max(0,s.qty-qty)}:s);
    }
    setStock(newStockArr);

    const orderNote = selectedDrink ? (note ? `${note} | İçki: ${selectedDrink}` : `İçki: ${selectedDrink}`) : note;
    setTables(prev=>({...prev,[selTable]:{...prev[selTable],orders:[...prev[selTable].orders,
      {id:Date.now(),n:item.name,p:item.price,q:qty,note:orderNote,t:timeStr(),x:false,
       directStockId:directMatch?directMatch.id:null, selectedDrink: selectedDrink||null}
    ]}}));
    setShowOrder(false); setMenuSearch(""); setCustom({name:"",price:"",qty:1});
  }

  // ── CANCEL ORDER ──
  function cancelOrder(tid, oid){
    const order = (tables[tid]?.orders||[]).find(o=>o.id===oid);
    if(order){
      let newStockArr = reverseStockRules(order.n, order.q, stock);
      if(order.directStockId){
        newStockArr = newStockArr.map(s=>s.id===order.directStockId?{...s,qty:s.qty+order.q}:s);
      }
      setStock(newStockArr);
    }
    setTables(prev=>({...prev,[tid]:{...prev[tid],orders:prev[tid].orders.map(o=>o.id===oid?{...o,x:true}:o)}}));
  }

  // ── PAY TABLE ──
  function payTable(method){
    const total=getTotal(selTable);
    const isIn=selTable<=15;
    setHistory(prev=>[{date:workDate,time:timeStr(),
      label:isIn?`İçəri ${selTable}`:`Çöl ${selTable-15}`,
      orders:tables[selTable].orders.filter(o=>!o.x),total,method},...prev]);
    setTables(prev=>({...prev,[selTable]:{orders:[]}}));
    setShowPay(false); setSelTable(null); setView("tables");
  }

  // ── ADD MENU ITEM ──
  function addMenuItem(){
    if(!newItem.name.trim()||!newItem.price) return;
    setMenu(prev=>[...prev,{id:Date.now(),name:newItem.name.trim(),price:parseFloat(newItem.price),cat:newItem.cat}]);
    setNewItem({name:"",price:"",cat:"İçki"});
  }

  // ── EXPENSES ──
  function addExpense(){
    if(!newExp.desc.trim()||!newExp.amount) return;
    setExpenses(prev=>[...prev,{id:Date.now(),date:workDate,time:timeStr(),...newExp,amount:parseFloat(newExp.amount)}]);
    setNewExp({cat:"Məhsul alışı",desc:"",amount:"",method:"Nağd"});
  }

  function deleteExpense(id){
    setExpenses(prev=>prev.filter(e=>e.id!==id));
  }

  function saveEditExpense(){
    if(!editExp) return;
    setExpenses(prev=>prev.map(e=>e.id===editExp.id?{...e,desc:editExp.desc,amount:parseFloat(editExp.amount),method:editExp.method,cat:editExp.cat}:e));
    setEditExp(null);
  }

  // ── STOCK ──
  function updateStock(id, delta){
    setStock(prev=>prev.map(s=>s.id===id?{...s,qty:Math.max(0,s.qty+delta)}:s));
  }

  // ── PASSWORDS ──
  function savePasswords(){
    let updated={...creds};
    if(pwForm.adminPw.trim()) updated.admin=pwForm.adminPw.trim();
    if(pwForm.waiterPw.trim()) updated.waiter=pwForm.waiterPw.trim();
    setCreds(updated);
    setPwMsg("✓ Şifrələr yadda saxlandı");
    setPwForm({adminPw:"",waiterPw:""});
    setTimeout(()=>setPwMsg(""),3000);
  }

  // ── ADD NEW SET ──
  function addNewSet(){
    if(!newSetForm.name.trim()||!newSetForm.price) return;
    const newId = Date.now();
    const drinkOpts = newSetForm.drinkOptions ? newSetForm.drinkOptions.split(",").map(s=>s.trim()).filter(Boolean) : [];
    const extrasArr = newSetForm.extras ? newSetForm.extras.split(",").map(s=>s.trim()).filter(Boolean) : [];
    setMenu(prev=>[...prev,{id:newId,name:newSetForm.name.trim(),price:parseFloat(newSetForm.price),cat:"Set"}]);
    setSetsConfig(prev=>[...prev,{id:newId,name:newSetForm.name.trim(),drinkOptions:drinkOpts,defaultDrink:newSetForm.defaultDrink||drinkOpts[0]||"",extras:extrasArr}]);
    setNewSetForm({name:"",price:"",defaultDrink:"",drinkOptions:"",extras:""});
    setShowNewSet(false);
  }

  // Stats
  const todayH=history.filter(h=>h.date===workDate);
  const todayTotal=todayH.reduce((s,h)=>s+h.total,0);
  const todayCash=todayH.filter(h=>h.method==="Nağd").reduce((s,h)=>s+h.total,0);
  const todayCard=todayH.filter(h=>h.method==="Kart").reduce((s,h)=>s+h.total,0);
  const todayExp=expenses.filter(e=>e.date===workDate).reduce((s,e)=>s+e.amount,0);
  const activeCount=ALL_TABLES.filter(t=>(tables[t.id]?.orders||[]).filter(o=>!o.x).length>0).length;
  const filtered=menu.filter(m=>(menuCat==="Hamısı"||m.cat===menuCat)&&(menuSearch===""||m.name.toLowerCase().includes(menuSearch.toLowerCase())));

  const SyncDot = ()=>(
    <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:syncStatus==="error"?C.red:syncStatus==="syncing"?C.gold:C.green}}>
      <div className={syncStatus==="syncing"?"sync-dot":""} style={{width:6,height:6,borderRadius:"50%",background:syncStatus==="error"?C.red:syncStatus==="syncing"?C.gold:C.green}}/>
      <span style={{color:C.muted}}>{syncStatus==="syncing"?"Sinxron...":syncStatus==="error"?"Xəta":"Canlı"}</span>
    </div>
  );

  if(loading) return <LoadingScreen/>;
  if(!role) return <LoginScreen onLogin={r=>{setRole(r);ls.set("role",r);}} creds={creds}/>;

  // ── DETAIL VIEW ──
  if(view==="detail"&&selTable){
    const orders=(tables[selTable]?.orders||[]).filter(o=>!o.x);
    const cancelled=(tables[selTable]?.orders||[]).filter(o=>o.x);
    const total=getTotal(selTable);
    const isIn=selTable<=15;
    const dNum=isIn?selTable:selTable-15;
    const dLoc=isIn?"İçəri":"Çöl";
    return(
      <div style={{minHeight:"100vh",background:C.bg,maxWidth:520,margin:"0 auto"}}>
        {/* Header */}
        <div style={{background:`linear-gradient(180deg,#14141e,${C.bg})`,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(12px)"}}>
          <button onClick={()=>{setView("tables");setSelTable(null);setShowOrder(false);}}
            style={{...btn("rgba(255,255,255,0.06)",C.text),padding:"7px 14px",fontSize:13,border:`1px solid ${C.border}`}}>← Geri</button>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:C.text}}>{dLoc} — Masa {dNum}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>{workDate}</div>
          </div>
          <SyncDot/>
        </div>

        <div style={{padding:"12px 14px",paddingBottom:150}}>
          {orders.length===0&&(
            <div style={{textAlign:"center",padding:"60px 0",color:C.muted}}>
              <div style={{fontSize:48,marginBottom:12,opacity:0.4}}>🍽</div>
              <div style={{fontSize:15,fontWeight:500}}>Hələ sifariş yoxdur</div>
              <div style={{fontSize:12,marginTop:6,color:"#44445a"}}>+ düyməsinə basın</div>
            </div>
          )}
          {orders.map(o=>(
            <div key={o.id} className="fade-in" style={{display:"flex",alignItems:"center",padding:"12px 14px",background:C.card,borderRadius:14,marginBottom:8,gap:10,border:`1px solid ${C.border}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:500}}>{o.n}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:3}}>{o.q} × {o.p.toFixed(2)}₼{o.note?` · ${o.note}`:""} · {o.t}</div>
              </div>
              <div style={{fontSize:15,fontWeight:700,color:C.gold}}>{(o.q*o.p).toFixed(2)}₼</div>
              <button onClick={()=>cancelOrder(selTable,o.id)}
                style={{...btn("rgba(224,85,85,0.1)",C.red),fontSize:16,padding:"6px 10px",border:"1px solid rgba(224,85,85,0.2)",borderRadius:10}}>✕</button>
            </div>
          ))}

          {cancelled.length>0&&(
            <details style={{marginTop:8}}>
              <summary style={{color:"#44445a",fontSize:12,cursor:"pointer",padding:"8px 4px",userSelect:"none"}}>
                Ləğv edilmiş ({cancelled.length})
              </summary>
              {cancelled.map(o=>(
                <div key={o.id} style={{display:"flex",padding:"9px 12px",background:"rgba(255,255,255,0.02)",borderRadius:10,marginBottom:5,opacity:0.4,gap:10}}>
                  <div style={{flex:1,fontSize:13,textDecoration:"line-through",color:"#555"}}>{o.n} × {o.q}</div>
                  <div style={{fontSize:13,color:"#444"}}>{(o.q*o.p).toFixed(2)}₼</div>
                </div>
              ))}
            </details>
          )}
        </div>

        {/* FAB */}
        <button onClick={()=>setShowOrder(true)}
          style={{position:"fixed",bottom:orders.length>0?100:28,right:20,width:58,height:58,borderRadius:"50%",
            background:`linear-gradient(135deg,${C.gold},#d4a030)`,border:"none",color:"#0a0a0f",
            fontSize:28,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 24px rgba(240,192,96,0.45)",
            display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>+</button>

        {/* Bottom bar */}
        {orders.length>0&&(
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,
            background:"rgba(12,12,18,0.95)",borderTop:`1px solid ${C.border}`,
            padding:"14px 16px 20px",display:"flex",alignItems:"center",gap:12,zIndex:100,backdropFilter:"blur(12px)"}}>
            <div style={{flex:1}}>
              <div style={{color:C.muted,fontSize:12}}>Ümumi məbləğ</div>
              <div style={{fontSize:26,fontWeight:800,color:C.gold,letterSpacing:-0.5}}>{total.toFixed(2)} ₼</div>
            </div>
            <button onClick={()=>setShowPay(true)}
              style={{...btn("linear-gradient(135deg,#2d7a3d,#1a5c28)","#fff"),padding:"13px 22px",fontSize:14,borderRadius:14,boxShadow:"0 4px 16px rgba(45,122,61,0.4)"}}>
              💳 Hesabı Bağla
            </button>
          </div>
        )}

        {/* Order Modal */}
        {showOrder&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end",backdropFilter:"blur(4px)"}}
            onClick={e=>{if(e.target===e.currentTarget){setShowOrder(false);setMenuSearch("");}}}>
            <div className="slide-up" style={{background:"#13131e",borderRadius:"22px 22px 0 0",maxHeight:"88vh",display:"flex",flexDirection:"column",border:`1px solid ${C.border}`}}>
              <div style={{width:40,height:4,background:"#2a2a3c",borderRadius:2,margin:"12px auto 14px"}}/>
              <div style={{padding:"0 16px 14px",borderBottom:`1px solid ${C.border}`,fontSize:16,fontWeight:700,color:C.text}}>Sifariş əlavə et</div>
              <div style={{padding:"12px 14px 0"}}>
                <input style={{...inp,background:"rgba(255,255,255,0.04)"}} placeholder="🔍 Axtar..." value={menuSearch} onChange={e=>setMenuSearch(e.target.value)} autoFocus/>
                <div style={{display:"flex",gap:6,overflowX:"auto",padding:"10px 0",scrollbarWidth:"none"}}>
                  {ALL_CATS.map(cat=>(
                    <button key={cat} onClick={()=>setMenuCat(cat)}
                      style={{...btn(menuCat===cat?C.gold:"rgba(255,255,255,0.04)",menuCat===cat?"#0a0a0f":C.muted),
                        border:`1px solid ${menuCat===cat?C.gold:C.border}`,borderRadius:20,fontSize:12,
                        padding:"5px 13px",whiteSpace:"nowrap",fontWeight:menuCat===cat?700:400}}>
                      {cat}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{overflowY:"auto",flex:1,padding:"8px 14px 24px"}}>
                {filtered.map(item=><MenuRow key={item.id} item={item} onAdd={addOrder} stock={stock} setsConfig={setsConfig}/>)}
                {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,padding:30,fontSize:13}}>Tapılmadı</div>}
                <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
                  <div style={{fontSize:12,color:C.muted,marginBottom:10,fontWeight:500}}>Əl ilə daxil et</div>
                  <input style={{...inp,marginBottom:8}} placeholder="Məhsul adı" value={custom.name} onChange={e=>setCustom(p=>({...p,name:e.target.value}))}/>
                  <div style={{display:"flex",gap:8}}>
                    <input style={{...inp,flex:1}} placeholder="Qiymət" type="number" step="0.01" value={custom.price} onChange={e=>setCustom(p=>({...p,price:e.target.value}))}/>
                    <input style={{...inp,width:70}} placeholder="Say" type="number" min="1" value={custom.qty} onChange={e=>setCustom(p=>({...p,qty:parseInt(e.target.value)||1}))}/>
                    <button onClick={()=>{if(custom.name&&custom.price)addOrder({name:custom.name,price:parseFloat(custom.price)},custom.qty,"",null);}}
                      style={{...btn("linear-gradient(135deg,#2d7a3d,#1f5c28)","#fff"),padding:"10px 14px",fontSize:13,whiteSpace:"nowrap",borderRadius:12}}>Əlavə</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Pay Modal */}
        {showPay&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end",backdropFilter:"blur(4px)"}}
            onClick={e=>{if(e.target===e.currentTarget)setShowPay(false);}}>
            <div className="slide-up" style={{background:"#13131e",borderRadius:"22px 22px 0 0",padding:"0 0 32px",border:`1px solid ${C.border}`}}>
              <div style={{width:40,height:4,background:"#2a2a3c",borderRadius:2,margin:"12px auto"}}/>
              <div style={{padding:"0 18px 16px",borderBottom:`1px solid ${C.border}`}}>
                <div style={{fontSize:16,fontWeight:700}}>Hesabı Bağla</div>
                <div style={{fontSize:13,color:C.muted,marginTop:4}}>Masa {dNum} · {orders.length} sifariş</div>
              </div>
              <div style={{padding:"28px 18px",textAlign:"center"}}>
                <div style={{fontSize:13,color:C.muted,marginBottom:6}}>Ümumi məbləğ</div>
                <div style={{fontSize:44,fontWeight:900,color:C.gold,letterSpacing:-1,marginBottom:28}}>{total.toFixed(2)} ₼</div>
                <div style={{display:"flex",gap:14}}>
                  <button onClick={()=>payTable("Nağd")}
                    style={{flex:1,background:"rgba(86,204,122,0.08)",border:`2px solid ${C.green}`,borderRadius:16,color:C.green,fontWeight:700,fontSize:17,padding:20,cursor:"pointer"}}>
                    💵 Nağd
                  </button>
                  <button onClick={()=>payTable("Kart")}
                    style={{flex:1,background:"rgba(96,168,240,0.08)",border:`2px solid ${C.blue}`,borderRadius:16,color:C.blue,fontWeight:700,fontSize:17,padding:20,cursor:"pointer"}}>
                    💳 Kart
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── HISTORY VIEW ──
  if(view==="history"){
    const grouped=history.reduce((a,h)=>{(a[h.date]=a[h.date]||[]).push(h);return a;},{});
    const monthlyByDate={};
    history.forEach(h=>{
      const [d,m,y]=h.date.split(".");
      const key=`${m}.${y}`;
      monthlyByDate[key]=(monthlyByDate[key]||0)+h.total;
    });
    return(
      <div style={{minHeight:"100vh",background:C.bg,maxWidth:520,margin:"0 auto"}}>
        <div style={{background:"#14141e",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(12px)"}}>
          <button onClick={()=>setView("tables")} style={{...btn("rgba(255,255,255,0.06)",C.text),padding:"7px 14px",fontSize:13,border:`1px solid ${C.border}`}}>← Geri</button>
          <div style={{flex:1,fontSize:16,fontWeight:700}}>📊 Hesabatlar</div>
          <SyncDot/>
        </div>
        <div style={{padding:"14px 14px 0"}}>
          {/* Today summary */}
          <div style={{background:"linear-gradient(135deg,rgba(30,44,30,0.8),rgba(15,25,15,0.9))",borderRadius:16,padding:18,border:"1px solid rgba(86,204,122,0.2)",marginBottom:14}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:0.8}}>Bu gün — {workDate}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[["💰 Gəlir",todayTotal.toFixed(2)+"₼",C.green],["💸 Xərc",todayExp.toFixed(2)+"₼",C.red],
                ["💵 Nağd",todayCash.toFixed(2)+"₼",C.textSub],["💳 Kart",todayCard.toFixed(2)+"₼",C.textSub]].map(([l,v,c])=>(
                <div key={l} style={{background:"rgba(0,0,0,0.25)",borderRadius:12,padding:"12px 14px"}}>
                  <div style={{fontSize:11,color:C.muted}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:c,marginTop:3}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:10,padding:"12px 14px",background:"rgba(0,0,0,0.25)",borderRadius:12}}>
              <div style={{fontSize:11,color:C.muted}}>📈 Xalis Mənfəət</div>
              <div style={{fontSize:22,fontWeight:800,color:(todayTotal-todayExp)>=0?C.green:C.red,marginTop:3}}>{(todayTotal-todayExp).toFixed(2)} ₼</div>
            </div>
          </div>

          {/* Monthly */}
          {Object.keys(monthlyByDate).length>0&&(
            <div className="glass-card" style={{padding:14,marginBottom:14}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:0.8}}>Aylıq Gəlir</div>
              {Object.entries(monthlyByDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([month,total])=>(
                <div key={month} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontSize:14}}>{month}</div>
                  <div style={{fontSize:14,fontWeight:700,color:C.gold}}>{total.toFixed(2)} ₼</div>
                </div>
              ))}
            </div>

                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setShowDate(false)} style={{flex:1,...btn("rgba(255,255,255,0.05)",C.text),padding:12,border:`1px solid ${C.border}`}}>Ləğv</button>
                  <button onClick={()=>{if(dateInput){setWorkDate(dateInput);setShowDate(false);}}} style={{flex:1,...btn("linear-gradient(135deg,#2d7a3d,#1f5c28)","#fff"),padding:12}}>Saxla</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Reset modal */}
        {showReset&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end",backdropFilter:"blur(4px)"}}
            onClick={e=>{if(e.target===e.currentTarget)setShowReset(false);}}>
            <div className="slide-up" style={{background:"#13131e",borderRadius:"22px 22px 0 0",padding:"0 0 32px",border:`1px solid ${C.border}`}}>
              <div style={{width:40,height:4,background:"#2a2a3c",borderRadius:2,margin:"12px auto"}}/>
              <div style={{fontSize:15,fontWeight:700,color:C.red,padding:"0 18px 14px",borderBottom:`1px solid ${C.border}`}}>⚠ Bütün masaları təmizlə?</div>
              <div style={{padding:"16px 18px"}}>
                <div style={{fontSize:13,color:C.muted,marginBottom:18}}>Açıq sifarişlər silinəcək. Geri almaq olmaz.</div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setShowReset(false)} style={{flex:1,...btn("rgba(255,255,255,0.05)",C.text),padding:12,border:`1px solid ${C.border}`}}>Ləğv et</button>
                  <button onClick={()=>{setTables(initTables());setShowReset(false);}} style={{flex:1,...btn("rgba(224,85,85,0.15)",C.red),border:"1px solid rgba(224,85,85,0.4)",padding:12}}>Sil</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* New set modal */}
        {showNewSet&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end",backdropFilter:"blur(4px)"}}
            onClick={e=>{if(e.target===e.currentTarget)setShowNewSet(false);}}>
            <div className="slide-up" style={{background:"#13131e",borderRadius:"22px 22px 0 0",padding:"0 0 32px",border:`1px solid ${C.border}`,maxHeight:"85vh",overflowY:"auto"}}>
              <div style={{width:40,height:4,background:"#2a2a3c",borderRadius:2,margin:"12px auto"}}/>
              <div style={{padding:"0 18px 14px",borderBottom:`1px solid ${C.border}`,fontSize:15,fontWeight:700,color:C.gold}}>🎁 Yeni Set Yarat</div>
              <div style={{padding:"16px 18px"}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Set adı</div>
                <input style={{...inp,marginBottom:10}} placeholder="Set 20" value={newSetForm.name} onChange={e=>setNewSetForm(p=>({...p,name:e.target.value}))}/>
                <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Qiymət (₼)</div>
                <input style={{...inp,marginBottom:10}} type="number" step="0.01" placeholder="20.00" value={newSetForm.price} onChange={e=>setNewSetForm(p=>({...p,price:e.target.value}))}/>
                <div style={{fontSize:12,color:C.muted,marginBottom:6}}>İçki seçimləri (vergüllə ayır)</div>
                <input style={{...inp,marginBottom:10}} placeholder="Pepsi 1L, Kola 1L, Sprite 1L" value={newSetForm.drinkOptions} onChange={e=>setNewSetForm(p=>({...p,drinkOptions:e.target.value}))}/>
                <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Default içki</div>
                <input style={{...inp,marginBottom:10}} placeholder="Pepsi 1L" value={newSetForm.defaultDrink} onChange={e=>setNewSetForm(p=>({...p,defaultDrink:e.target.value}))}/>
                <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Stokdan azalacaq əlavələr (vergüllə)</div>
                <input style={{...inp,marginBottom:16}} placeholder="Tost, Tost" value={newSetForm.extras} onChange={e=>setNewSetForm(p=>({...p,extras:e.target.value}))}/>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setShowNewSet(false)} style={{flex:1,...btn("rgba(255,255,255,0.05)",C.text),padding:12,border:`1px solid ${C.border}`}}>Ləğv</button>
                  <button onClick={addNewSet} style={{flex:1,...btn("linear-gradient(135deg,#5a3a9a,#3a2270)","#fff"),padding:12}}>Yarat</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── MAIN TABLE VIEW ──
  const isAdmin = role==="admin";
  return(
    <div style={{minHeight:"100vh",background:C.bg,maxWidth:520,margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#16161f,#0a0a0f)",padding:"14px 16px 10px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(16px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>🍔</span>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.text,letterSpacing:-0.3}}>PitStop</div>
              <div style={{fontSize:10,color:C.muted,marginTop:-1}}>Masa İdarəsi</div>
            </div>
            <div className="badge" style={{background:isAdmin?"rgba(240,192,96,0.1)":"rgba(86,204,122,0.1)",color:isAdmin?C.gold:C.green,border:`1px solid ${isAdmin?"rgba(240,192,96,0.3)":"rgba(86,204,122,0.3)"}`}}>
              {isAdmin?"👑 Admin":"👤 Ofisiant"}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <SyncDot/>
            <button onClick={()=>{setDateInput(workDate);setShowDate(true);}}
              style={{...btn("rgba(255,255,255,0.05)",C.textSub),border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",fontSize:11}}>
              📅 {workDate}
            </button>
            <button onClick={logout} style={{...btn("rgba(255,255,255,0.04)",C.muted),padding:"5px 10px",fontSize:11,borderRadius:8,border:`1px solid ${C.border}`}}>Çıx</button>
          </div>
        </div>
        {/* Stats bar */}
        <div style={{display:"flex",gap:7,overflowX:"auto",scrollbarWidth:"none",paddingBottom:2}}>
          {[
            {label:"Aktiv", value:activeCount, color:C.green},
            {label:"Gəlir", value:todayTotal.toFixed(2)+"₼", color:C.gold},
            {label:"Nağd", value:todayCash.toFixed(2)+"₼", color:C.textSub},
            {label:"Kart", value:todayCard.toFixed(2)+"₼", color:C.blue},
          ].map(({label,value,color})=>(
            <div key={label} style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`,borderRadius:10,padding:"6px 12px",fontSize:11,whiteSpace:"nowrap",flex:"0 0 auto"}}>
              <span style={{color:C.muted}}>{label}: </span>
              <span style={{color,fontWeight:700}}>{value}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Navigation */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:"#0e0e17",overflowX:"auto",scrollbarWidth:"none"}}>
        {[
          ["tables","🪑 Masalar",true],
          ["history","📊 Hesabat",isAdmin],
          ["stock","📦 Stok",isAdmin],
          ["expenses","💸 Xərc",isAdmin],
          ["settings","⚙️",isAdmin],
        ].filter(([,,show])=>show).map(([v,l])=>(
          <button key={v} className="nav-tab" onClick={()=>setView(v)}
            style={{flex:v==="settings"?0:1,padding:v==="settings"?"11px 16px":"11px 8px",
              background:view===v?"rgba(240,192,96,0.06)":"transparent",
              border:"none",borderBottom:view===v?`2px solid ${C.gold}`:"2px solid transparent",
              color:view===v?C.gold:C.muted,fontSize:12,fontWeight:view===v?700:400,
              cursor:"pointer",whiteSpace:"nowrap"}}>
            {l}
          </button>
        ))}
      </div>

      {/* Table view */}
      {view==="tables"&&(
        <>
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`}}>
            {[["içəri","🏠 İçəri"],["çöl","🌿 Çöl"]].map(([v,l])=>(
              <button key={v} onClick={()=>setLoc(v)}
                style={{flex:1,padding:"11px",background:loc===v?`rgba(240,192,96,0.08)`:"transparent",
                  border:"none",borderBottom:loc===v?`2px solid ${C.gold}`:"2px solid transparent",
                  color:loc===v?C.gold:C.muted,fontWeight:loc===v?700:400,fontSize:13,cursor:"pointer",
                  transition:"all 0.15s"}}>
                {l} (15)
              </button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,padding:"14px 12px"}}>
            {ALL_TABLES.filter(t=>t.loc===loc).map(t=>{
              const orders=(tables[t.id]?.orders||[]).filter(o=>!o.x);
              const hasO=orders.length>0;
              const total=getTotal(t.id);
              const dNum=t.id<=15?t.id:t.id-15;
              return(
                <div key={t.id} className="table-card" onClick={()=>{setSelTable(t.id);setView("detail");}}
                  style={{background:hasO?"linear-gradient(145deg,rgba(30,50,30,0.9),rgba(15,28,15,0.95))":"rgba(22,22,32,0.8)",
                    border:`1.5px solid ${hasO?"rgba(86,204,122,0.35)":C.border}`,borderRadius:14,
                    padding:"13px 10px",cursor:"pointer",position:"relative",
                    minHeight:88,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,
                    boxShadow:hasO?"0 4px 20px rgba(86,204,122,0.08)":"none"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",
                    background:hasO?C.green:"#2a2a3c",
                    position:"absolute",top:10,right:10,
                    boxShadow:hasO?"0 0 8px rgba(86,204,122,0.6)":"none"}}/>
                  <div style={{fontSize:24,fontWeight:800,color:hasO?C.text:"#3a3a50"}}>{dNum}</div>
                  <div style={{fontSize:13,fontWeight:700,color:hasO?C.green:"#2a2a40"}}>{hasO?`${total.toFixed(2)} ₼`:"Boş"}</div>
                  {hasO&&<div style={{fontSize:10,color:C.muted}}>{orders.length} sif.</div>}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Date modal in main view */}
      {showDate&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end",backdropFilter:"blur(4px)"}}
          onClick={e=>{if(e.target===e.currentTarget)setShowDate(false);}}>
          <div className="slide-up" style={{background:"#13131e",borderRadius:"22px 22px 0 0",padding:"0 0 32px",border:`1px solid ${C.border}`}}>
            <div style={{width:40,height:4,background:"#2a2a3c",borderRadius:2,margin:"12px auto"}}/>
            <div style={{padding:"0 18px 14px",borderBottom:`1px solid ${C.border}`,fontSize:15,fontWeight:700,color:C.gold}}>İş günü tarixi</div>
            <div style={{padding:"16px 18px"}}>
              <input style={{...inp,marginBottom:14}} placeholder="28.05.2026" value={dateInput} onChange={e=>setDateInput(e.target.value)}/>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setShowDate(false)} style={{flex:1,...btn("rgba(255,255,255,0.05)",C.text),padding:12,border:`1px solid ${C.border}`}}>Ləğv</button>
                <button onClick={()=>{if(dateInput){setWorkDate(dateInput);setShowDate(false);}}} style={{flex:1,...btn("linear-gradient(135deg,#2d7a3d,#1f5c28)","#fff"),padding:12}}>Saxla</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
