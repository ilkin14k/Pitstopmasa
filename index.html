<!DOCTYPE html>
<html lang="az">

<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* ─── RESET & BASE ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100dvh;
  background:#080810;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:#EEEAF2;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{display:none}
input,select,button,textarea{font-family:inherit;-webkit-appearance:none}
select option{background:#131320;color:#EEEAF2}
button{cursor:pointer}

/* ─── DESIGN TOKENS ─── */
:root{
  /* Brand */
  --gold:#F5C842;
  --gold-dim:rgba(245,200,66,0.12);
  --gold-border:rgba(245,200,66,0.25);

  /* Semantic */
  --success:#4ADE80;
  --success-dim:rgba(74,222,128,0.1);
  --success-border:rgba(74,222,128,0.25);
  --danger:#F87171;
  --danger-dim:rgba(248,113,113,0.1);
  --danger-border:rgba(248,113,113,0.25);
  --info:#60A5FA;
  --info-dim:rgba(96,165,250,0.1);
  --info-border:rgba(96,165,250,0.25);
  --warning:#FB923C;
  --warning-dim:rgba(251,146,60,0.1);

  /* Surfaces */
  --bg:#080810;
  --surface-1:#0F0F1C;
  --surface-2:#151524;
  --surface-3:#1C1C2E;
  --surface-hover:#202034;

  /* Borders */
  --border-1:rgba(255,255,255,0.06);
  --border-2:rgba(255,255,255,0.10);

  /* Text */
  --text-primary:#EEEAF2;
  --text-secondary:#9B98B0;
  --text-tertiary:#5A5870;

  /* Radius */
  --r-sm:8px;
  --r-md:12px;
  --r-lg:16px;
  --r-xl:20px;
  --r-2xl:24px;

  /* Shadows */
  --shadow-sm:0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.6);
  --shadow-gold:0 4px 24px rgba(245,200,66,0.2);
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}

.anim-fadeup{animation:fadeUp 0.22s cubic-bezier(0.16,1,0.3,1) both}
.anim-slidup{animation:slideUp 0.32s cubic-bezier(0.32,0.72,0,1) both}
.anim-fadein{animation:fadeIn 0.18s ease both}
.anim-scalein{animation:scaleIn 0.2s cubic-bezier(0.16,1,0.3,1) both}
.spin{animation:spin 0.8s linear infinite}
.pulse{animation:pulse 2s ease-in-out infinite}

/* ─── COMPONENTS ─── */

/* Card */
.card{
  background:var(--surface-2);
  border:1px solid var(--border-1);
  border-radius:var(--r-lg);
}
.card-inset{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border-1);
  border-radius:var(--r-md);
}

/* Input */
.inp{
  width:100%;
  background:var(--surface-1);
  border:1.5px solid var(--border-1);
  border-radius:var(--r-md);
  color:var(--text-primary);
  font-size:15px;
  font-family:inherit;
  padding:12px 14px;
  outline:none;
  transition:border-color 0.15s,background 0.15s;
  -webkit-appearance:none;
}
.inp:focus{border-color:var(--gold-border);background:rgba(245,200,66,0.03)}
.inp::placeholder{color:var(--text-tertiary)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:var(--r-md);
  font-family:inherit;font-weight:600;font-size:14px;
  cursor:pointer;transition:all 0.15s;
  -webkit-appearance:none;
}
.btn:active{transform:scale(0.96)}

.btn-primary{
  background:var(--gold);color:#080810;
  box-shadow:var(--shadow-gold);
  padding:13px 20px;
}
.btn-primary:hover{background:#FDDB6D}

.btn-secondary{
  background:var(--surface-3);color:var(--text-primary);
  border:1px solid var(--border-2);
  padding:12px 18px;
}
.btn-secondary:hover{background:var(--surface-hover)}

.btn-success{
  background:var(--success-dim);color:var(--success);
  border:1px solid var(--success-border);
  padding:12px 18px;
}
.btn-danger{
  background:var(--danger-dim);color:var(--danger);
  border:1px solid var(--danger-border);
  padding:12px 18px;
}
.btn-ghost{
  background:transparent;color:var(--text-secondary);
  border:1px solid var(--border-1);
  padding:10px 14px;
}
.btn-icon{
  background:var(--surface-3);color:var(--text-secondary);
  border:1px solid var(--border-1);
  border-radius:var(--r-sm);
  padding:8px;width:36px;height:36px;
}

/* Badge */
.badge{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:600;
  border-radius:6px;padding:3px 8px;
  white-space:nowrap;
}
.badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.badge-success{background:var(--success-dim);color:var(--success);border:1px solid var(--success-border)}
.badge-danger{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger-border)}
.badge-info{background:var(--info-dim);color:var(--info);border:1px solid var(--info-border)}
.badge-muted{background:rgba(255,255,255,0.05);color:var(--text-secondary);border:1px solid var(--border-1)}

/* Divider */
.divider{height:1px;background:var(--border-1);margin:0}

/* Stat card */
.stat-card{
  background:var(--surface-2);
  border:1px solid var(--border-1);
  border-radius:var(--r-md);
  padding:14px;
}

/* Table card */
.table-card{
  background:var(--surface-2);
  border:1.5px solid var(--border-1);
  border-radius:var(--r-lg);
  padding:14px 10px;
  cursor:pointer;
  transition:all 0.18s cubic-bezier(0.16,1,0.3,1);
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;min-height:88px;
}
.table-card:active{transform:scale(0.95)}
.table-card.occupied{
  background:linear-gradient(145deg,rgba(20,38,20,0.95),rgba(10,24,10,0.98));
  border-color:rgba(74,222,128,0.3);
  box-shadow:0 2px 16px rgba(74,222,128,0.08);
}

/* Bottom sheet overlay */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  z-index:400;
  display:flex;flex-direction:column;justify-content:flex-end;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}
.sheet{
  background:var(--surface-1);
  border-radius:var(--r-2xl) var(--r-2xl) 0 0;
  border:1px solid var(--border-2);
  border-bottom:none;
  max-height:92dvh;
  display:flex;flex-direction:column;
}
.sheet-handle{
  width:36px;height:4px;
  background:var(--border-2);
  border-radius:2px;
  margin:12px auto 14px;
  flex-shrink:0;
}
.sheet-header{
  padding:0 18px 14px;
  border-bottom:1px solid var(--border-1);
  flex-shrink:0;
}
.sheet-body{
  flex:1;overflow-y:auto;
  padding:16px 18px;
}
.sheet-footer{
  padding:14px 18px 24px;
  border-top:1px solid var(--border-1);
  flex-shrink:0;
}

/* Nav */
.nav-bar{
  display:flex;
  background:var(--surface-1);
  border-bottom:1px solid var(--border-1);
  overflow-x:auto;
  scrollbar-width:none;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:10px 6px;
  background:transparent;border:none;
  color:var(--text-tertiary);
  font-size:10px;font-weight:500;
  font-family:inherit;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.15s;white-space:nowrap;
  min-width:56px;
}
.nav-tab.active{
  color:var(--gold);
  border-bottom-color:var(--gold);
}
.nav-tab-icon{font-size:18px;line-height:1}

/* Section label */
.section-label{
  font-size:11px;font-weight:700;
  color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:10px;
}

/* Order item */
.order-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:var(--surface-2);
  border:1px solid var(--border-1);
  border-radius:var(--r-md);
  margin-bottom:7px;
}

/* Price display */
.price{
  font-variant-numeric:tabular-nums;
  font-feature-settings:'tnum';
}

/* Page */
.page{
  min-height:100dvh;
  max-width:520px;
  margin:0 auto;
  position:relative;
}

/* Header */
.page-header{
  background:rgba(8,8,16,0.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-1);
  position:sticky;top:0;z-index:100;
}

/* Kassa warning */
.kassa-warning{
  background:linear-gradient(135deg,rgba(251,146,60,0.12),rgba(251,146,60,0.06));
  border:1px solid rgba(251,146,60,0.3);
  border-radius:var(--r-md);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  margin:12px 14px 0;
}

/* Shimmer loading */
.shimmer{
  background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);
  background-size:400px 100%;
  animation:shimmer 1.4s ease-in-out infinite;
}

/* FAB */
.fab{
  position:fixed;
  width:56px;height:56px;
  border-radius:50%;
  background:var(--gold);
  color:#080810;
  font-size:28px;font-weight:300;
  border:none;cursor:pointer;
  box-shadow:var(--shadow-gold);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
  z-index:200;
}
.fab:active{transform:scale(0.92)}

/* Scroll area */
.scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Qty stepper */
.stepper{
  display:flex;align-items:center;gap:0;
  background:var(--surface-1);
  border:1.5px solid var(--border-2);
  border-radius:var(--r-md);
  overflow:hidden;
}
.stepper-btn{
  background:transparent;border:none;
  color:var(--text-primary);
  width:38px;height:38px;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.1s;
}
.stepper-btn:active{background:var(--surface-3)}
.stepper-val{
  min-width:36px;text-align:center;
  font-size:15px;font-weight:700;
  color:var(--text-primary);
  padding:0 4px;
}

/* Chip filter */
.chip{
  display:inline-flex;align-items:center;
  padding:6px 13px;
  border-radius:20px;
  font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;
  border:1px solid var(--border-1);
  background:transparent;
  color:var(--text-secondary);
  font-family:inherit;
  transition:all 0.15s;
}
.chip.active{
  background:var(--gold-dim);
  border-color:var(--gold-border);
  color:var(--gold);
  font-weight:600;
}

/* Toast */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--surface-3);
  border:1px solid var(--border-2);
  border-radius:var(--r-md);
  padding:10px 16px;
  font-size:13px;font-weight:500;
  white-space:nowrap;
  z-index:500;
  box-shadow:var(--shadow-md);
  animation:fadeUp 0.2s ease both;
}

/* Sync indicator */
.sync{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:500;
}
.sync-dot{
  width:6px;height:6px;border-radius:50%;
}

/* Kassa close card */
.kassa-diff-positive{color:var(--success)}
.kassa-diff-negative{color:var(--danger)}
.kassa-diff-zero{color:var(--text-secondary)}

/* ─── DESKTOP LAYOUT ─── */
.app-shell{display:flex;min-height:100dvh}
.sidebar{display:none}
.main-content{flex:1;min-width:0;max-width:520px;margin:0 auto;position:relative}

@media(min-width:900px){
  ::-webkit-scrollbar{display:block;width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}

  .app-shell{display:grid;grid-template-columns:220px 1fr;height:100dvh;overflow:hidden}

  .sidebar{
    display:flex;flex-direction:column;
    background:var(--surface-1);
    border-right:1px solid var(--border-1);
    height:100dvh;overflow-y:auto;
    position:sticky;top:0;z-index:50;
  }
  .sidebar-logo{
    padding:20px 18px 16px;border-bottom:1px solid var(--border-1);
    display:flex;align-items:center;gap:10px;
  }
  .sidebar-nav{padding:10px 8px;flex:1}
  .sidebar-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:var(--r-md);
    cursor:pointer;font-size:14px;font-weight:500;
    color:var(--text-secondary);background:transparent;border:none;
    font-family:inherit;width:100%;text-align:left;
    transition:all 0.15s;margin-bottom:2px;
  }
  .sidebar-item:hover{background:var(--surface-hover);color:var(--text-primary)}
  .sidebar-item.active{
    background:var(--gold-dim);color:var(--gold);
    border:1px solid var(--gold-border);font-weight:600;
  }
  .sidebar-footer{padding:12px 8px 20px;border-top:1px solid var(--border-1)}

  .main-content{max-width:100%;margin:0;overflow-y:auto;height:100dvh}

  .nav-bar{display:none !important}
  .page-header{padding:16px 24px !important}
  .desktop-pad{padding-left:24px !important;padding-right:24px !important}

  .tables-grid{
    grid-template-columns:repeat(5,1fr) !important;
    padding:16px 24px !important;gap:10px !important;
  }
  .table-card{min-height:96px !important}

  .overlay{justify-content:center;align-items:center;padding:20px}
  .sheet{border-radius:var(--r-2xl) !important;max-width:480px;width:100%;max-height:88dvh}
  .sheet-handle{display:none}

  .stats-row{
    display:grid !important;
    grid-template-columns:repeat(4,1fr) !important;
    gap:8px !important;overflow:visible !important;
  }
  .stat-pill{border-radius:var(--r-md) !important;padding:10px 14px !important;flex-shrink:unset !important}
  .fab{bottom:24px !important;right:24px !important}
  .kassa-warning{margin:10px 24px 0 !important}
}

@media(min-width:1200px){
  .app-shell{grid-template-columns:240px 1fr}
  .tables-grid{grid-template-columns:repeat(6,1fr) !important}
}
</style>

/* ─── STOCK RULES ─── */
function applyStock(itemName,qty,stockArr){
  let s=[...stockArr];
  const n=itemName.toLowerCase().trim();
  if(n.includes("burger"))
    s=s.map(x=>x.name.toLowerCase().includes("baton")||x.name.toLowerCase().includes("burger çörəyi")?{...x,qty:Math.max(0,x.qty-qty)}:x);
  if(n==="set 11")
    s=s.map(x=>{const xn=x.name.toLowerCase();if(xn==="pepsi 1l")return{...x,qty:Math.max(0,x.qty-qty)};if(xn==="tost")return{...x,qty:Math.max(0,x.qty-2*qty)};return x;});
  if(n==="set 16")
    s=s.map(x=>{const xn=x.name.toLowerCase();if(xn==="pepsi 2.25l")return{...x,qty:Math.max(0,x.qty-qty)};return x;});
  if(n==="limonad")
    s=s.map(x=>{const xn=x.name.toLowerCase();if(xn==="sprite 1l")return{...x,qty:Math.max(0,x.qty-qty)};return x;});
  return s;
}
function reverseStock(itemName,qty,stockArr){
  let s=[...stockArr];
  const n=itemName.toLowerCase().trim();
  if(n.includes("burger"))
    s=s.map(x=>x.name.toLowerCase().includes("baton")||x.name.toLowerCase().includes("burger çörəyi")?{...x,qty:x.qty+qty}:x);
  if(n==="set 11")
    s=s.map(x=>{const xn=x.name.toLowerCase();if(xn==="pepsi 1l")return{...x,qty:x.qty+qty};if(xn==="tost")return{...x,qty:x.qty+2*qty};return x;});
  if(n==="set 16")
    s=s.map(x=>{const xn=x.name.toLowerCase();if(xn==="pepsi 2.25l")return{...x,qty:x.qty+qty};return x;});
  if(n==="limonad")
    s=s.map(x=>{const xn=x.name.toLowerCase();if(xn==="sprite 1l")return{...x,qty:x.qty+qty};return x;});
  return s;
}

/* ─── SYNC DOT ─── */
function SyncDot({status}){
  const c=status==="error"?"var(--danger)":status==="syncing"?"var(--gold)":"var(--success)";
  const label=status==="syncing"?"Sinxron":status==="error"?"Xəta":"Canlı";
  return(
    <div className="sync">
      <div className={`sync-dot${status==="syncing"?" pulse":""}`} style={{background:c}}/>
      <span style={{color:"var(--text-tertiary)"}}>{label}</span>
    </div>
  );
}

/* ─── TOAST ─── */
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  return <div className="toast">{msg}</div>;
}

  function handleAdd(){
    const n=sc&&drink?(note?`${note} | İçki: ${drink}`:`İçki: ${drink}`):note;

/* ─── KASSA CLOSE MODAL ─── */
function KassaCloseModal({workDate,todayTotal,todayCash,todayExp,kassaStart,onClose}){
  const expected=(kassaStart||0)+todayCash-expenses2cash(todayExp);
  // net cash = kassa start + nağd gəlir - nağd xərclər
  const [physical,setPhysical]=useState("");
  const [withdraw,setWithdraw]=useState("");
  const [note,setNote]=useState("");
  const [done,setDone]=useState(false);
  const [result,setResult]=useState(null);

  function handleClose(){
    const phys=parseFloat(physical)||0;
    const with_=parseFloat(withdraw)||0;
    const nextDay=phys-with_;
    const diff=phys-expected;
    setResult({phys,with_,nextDay,diff});
    setDone(true);
    onClose({physical:phys,withdrawn:with_,nextStart:nextDay,diff,date:workDate,note});
  }

  if(done&&result){
    const diffColor=result.diff>0?"kassa-diff-positive":result.diff<0?"kassa-diff-negative":"kassa-diff-zero";

                <div key={l} className="stat-card">
                  <div style={{fontSize:11,color:"var(--text-tertiary)"}}>{l}</div>

              </div>
              <div style={{fontSize:12,color:"var(--text-tertiary)",marginTop:2}}>

              </div>
            </div>
          </div>

            <button className="btn btn-primary" style={{width:"100%"}} onClick={()=>onClose(null)}>Bağla</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose(null)}>
      <div className="sheet anim-slidup">
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <div style={{fontSize:16,fontWeight:700}}>Günü Bağla</div>
          <div style={{fontSize:13,color:"var(--text-tertiary)",marginTop:4}}>{workDate}</div>
        </div>
        <div className="sheet-body">
          {/* Summary */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {[["Nağd Gəlir",`${todayCash.toFixed(2)}₼`,"var(--success)"],["Gözlənilən Kassa",`${expected.toFixed(2)}₼`,"var(--gold)"]].map(([l,v,c])=>(
              <div key={l} className="stat-card">

          {/* Withdraw */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"var(--text-tertiary)",fontWeight:600,marginBottom:6}}>Götürülən məbləğ (₼) — sabaha qalan istisna</div>
            <input className="inp" type="number" step="0.01" placeholder="0.00" value={withdraw} onChange={e=>setWithdraw(e.target.value)}/>
          </div>
          {/* Preview */}
          {physical&&<div className="card-inset" style={{padding:12,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:"var(--text-tertiary)"}}>Sabaha qalan:</span>
            <span className="price" style={{fontSize:16,fontWeight:800,color:"var(--gold)"}}>
              {((parseFloat(physical)||0)-(parseFloat(withdraw)||0)).toFixed(2)}₼
            </span>
          </div>}
          {/* Note */}
          <div style={{marginBottom:4}}>
            <div style={{fontSize:12,color:"var(--text-tertiary)",fontWeight:600,marginBottom:6}}>Qeyd (ixtiyari)</div>
            <input className="inp" placeholder="məs: 20₼ Əli müəllimə verildi" value={note} onChange={e=>setNote(e.target.value)}/>
          </div>
        </div>
        <div className="sheet-footer">
          <button className="btn btn-primary" style={{width:"100%",fontSize:15}} onClick={handleClose} disabled={!physical}>
            Günü Bağla
          </button>
        </div>
      </div>
    </div>
  );
}

// Helper — nağd xərcin nə qədəri nağddır (kassa çıxarışı xaric real xərc)
function expenses2cash(dailyExpTotal){return dailyExpTotal;}

/* ─── MAIN APP ─── */
function App(){
  const [loading,setLoading]=useState(true);
  const [sync,setSync]=useState("ok");
  const [role,setRole]=useState(()=>ls.get("role",null));
  const [tables,setTables]=useState(initTables);
  const [menu,setMenu]=useState(DEFAULT_MENU);
  const [stock,setStock]=useState(DEFAULT_STOCK);
  const [expenses,setExpenses]=useState([]);
  const [history,setHistory]=useState([]);
  const [workDate,setWorkDate]=useState(getWorkDate);
  const [creds,setCreds]=useState(DEFAULT_CREDS);
  const [setsConfig,setSetsConfig]=useState(DEFAULT_SETS);
  // Kassa
  const [kassaLog,setKassaLog]=useState([]); // [{date,physical,withdrawn,nextStart,diff,note}]
  const [kassaStart,setKassaStart]=useState(0); // başlanğıc məbləğ

  const [view,setView]=useState("tables");
  const [selTable,setSelTable]=useState(null);
  const [loc,setLoc]=useState("içəri");
  const [showOrder,setShowOrder]=useState(false);
  const [showPay,setShowPay]=useState(false);
  const [splitMode,setSplitMode]=useState(false);
  const [splitCash,setSplitCash]=useState("");
  const [splitCard,setSplitCard]=useState("");
  const [showDate,setShowDate]=useState(false);
  const [showReset,setShowReset]=useState(false);
  const [showKassaClose,setShowKassaClose]=useState(false);
  const [showNewSet,setShowNewSet]=useState(false);
  const [invLog,setInvLog]=useState([]); // [{id,date,time,by,items:[{stockId,name,unit,system,actual,diff,reason}],totalLoss}]
  const [invDraft,setInvDraft]=useState(null); // active inventory session
  const [menuSearch,setMenuSearch]=useState("");
  const [menuCat,setMenuCat]=useState("Hamısı");
  const [custom,setCustom]=useState({name:"",price:"",qty:1});
  const [newItem,setNewItem]=useState({name:"",price:"",cat:"İçki"});
  const [delConfirm,setDelConfirm]=useState(null);
  const [dateInput,setDateInput]=useState("");
  const [newStock,setNewStock]=useState({name:"",unit:"ədəd",qty:"",min:""});
  const [stockAdd,setStockAdd]=useState({});
  const [stockDel,setStockDel]=useState(null);
  const [newExp,setNewExp]=useState({cat:"Məhsul alışı",desc:"",amount:"",method:"Nağd"});
  const [editExp,setEditExp]=useState(null);
  const [pwForm,setPwForm]=useState({a:"",w:""});
  const [pwMsg,setPwMsg]=useState("");
  const [newSetForm,setNewSetForm]=useState({name:"",price:"",defaultDrink:"",drinkOptions:"",extras:""});
  const [refreshing,setRefreshing]=useState(false);
  const [hasNew,setHasNew]=useState(false);

  async function manualRefresh(){
    setRefreshing(true);
    try{
      const [t,m,s,e,h,w,c,sc,kl,ks,il]=await Promise.all([
        dbGet("tables"),dbGet("menu"),dbGet("stock"),dbGet("expenses"),
        dbGet("history"),dbGet("workDate"),dbGet("creds"),dbGet("setsConfig"),
        dbGet("kassaLog"),dbGet("kassaStart"),dbGet("invLog")
      ]);
      if(t)setTables({...initTables(),...t});if(m)setMenu(m);if(s)setStock(s);
      if(e)setExpenses(e);if(h)setHistory(h);if(w)setWorkDate(w);
      if(c)setCreds(c);if(sc)setSetsConfig(sc);
      if(kl)setKassaLog(kl);if(ks!=null)setKassaStart(ks);
      if(il)setInvLog(il);
      setHasNew(false);
      showToast("✓ Yeniləndi");
    }catch{showToast("⚠ Xəta");}
    setRefreshing(false);
  }
  const [toast,setToast]=useState(null);
  const timers=useRef({});

  function showToast(msg){setToast(msg);}

  /* LOAD */
  useEffect(()=>{
    async function load(){
      setLoading(true);
      try{
        const [t,m,s,e,h,w,c,sc,kl,ks,il]=await Promise.all([
          dbGet("tables"),dbGet("menu"),dbGet("stock"),dbGet("expenses"),
          dbGet("history"),dbGet("workDate"),dbGet("creds"),dbGet("setsConfig"),
          dbGet("kassaLog"),dbGet("kassaStart"),dbGet("invLog")
        ]);
        if(t)setTables({...initTables(),...t});if(m)setMenu(m);if(s)setStock(s);
        if(e)setExpenses(e);if(h)setHistory(h);if(w)setWorkDate(w);
        if(c)setCreds(c);if(sc)setSetsConfig(sc);
        if(kl)setKassaLog(kl);if(ks!=null)setKassaStart(ks);
        if(il)setInvLog(il);
      }catch(err){console.error(err);}
      setLoading(false);
    }
    load();
  },[]);

  /* REALTIME */
  useEffect(()=>{
    if(loading)return;
    const ch=sb.channel("app_state_changes")
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"app_state"},(p)=>{
        const{key:k,value:v}=p.new;setSync("ok");setHasNew(true);
        const upd=(setter)=>setter(prev=>JSON.stringify(prev)!==JSON.stringify(v)?v:prev);
        if(k==="tables"){const merged={...initTables(),...v};setTables(prev=>JSON.stringify(prev)!==JSON.stringify(merged)?merged:prev);}if(k==="menu")upd(setMenu);if(k==="stock")upd(setStock);
        if(k==="expenses")upd(setExpenses);if(k==="history")upd(setHistory);
        if(k==="workDate")setWorkDate(prev=>prev!==v?v:prev);
        if(k==="creds")upd(setCreds);if(k==="setsConfig")upd(setSetsConfig);
        if(k==="kassaLog")upd(setKassaLog);if(k==="kassaStart")setKassaStart(v);
        if(k==="invLog")upd(setInvLog);
      }).subscribe();
    return()=>sb.removeChannel(ch);
  },[loading]);

  /* SAVE */
  function save(key,value,delay=600){
    if(timers.current[key])clearTimeout(timers.current[key]);
    setSync("syncing");
    timers.current[key]=setTimeout(async()=>{await dbSet(key,value);setSync("ok");},delay);
  }
  const fr=useRef(true);
  useEffect(()=>{if(fr.current){fr.current=false;return;}save("tables",tables);},[tables]);
  useEffect(()=>{if(!loading)save("menu",menu);},[menu]);
  useEffect(()=>{if(!loading)save("stock",stock);},[stock]);
  useEffect(()=>{if(!loading)save("expenses",expenses);},[expenses]);
  useEffect(()=>{if(!loading)save("history",history);},[history]);
  useEffect(()=>{if(!loading)save("workDate",workDate);},[workDate]);
  useEffect(()=>{if(!loading)save("creds",creds);},[creds]);
  useEffect(()=>{if(!loading)save("setsConfig",setsConfig);},[setsConfig]);
  useEffect(()=>{if(!loading)save("kassaLog",kassaLog);},[kassaLog]);
  useEffect(()=>{if(!loading)save("kassaStart",kassaStart);},[kassaStart]);
  useEffect(()=>{if(!loading)save("invLog",invLog);},[invLog]);
  useEffect(()=>{ls.set("role",role);},[role]);

  /* FLUSH — tətbiq fonda/bağlanarkən gözləyən (debounce olunmuş) yazıları itirməsin */
  useEffect(()=>{
    if(loading)return;
    function flush(){
      Object.keys(timers.current).forEach(k=>{if(timers.current[k])clearTimeout(timers.current[k]);});
      timers.current={};
      dbSet("history",history);dbSet("expenses",expenses);dbSet("tables",tables);
      dbSet("kassaLog",kassaLog);dbSet("kassaStart",kassaStart);dbSet("workDate",workDate);
    }
    function onVis(){if(document.hidden)flush();}
    document.addEventListener("visibilitychange",onVis);
    window.addEventListener("pagehide",flush);
    return()=>{document.removeEventListener("visibilitychange",onVis);window.removeEventListener("pagehide",flush);};
  },[loading,history,expenses,tables,kassaLog,kassaStart,workDate]);

  function logout(){setRole(null);ls.set("role",null);setView("tables");}
  const getTotal=tid=>((tables[tid]?.orders||[]).filter(o=>!o.x).reduce((s,o)=>s+o.p*o.q,0));

  /* STATS */
  const todayH=history.filter(h=>h.date===workDate);
  const todayTotal=todayH.reduce((s,h)=>s+h.total,0);
  const todayCash=todayH.reduce((s,h)=>s+(h.method==="Nağd"?h.total:h.method==="Qarışıq"?(h.cashAmount||0):0),0);
  const todayCard=todayH.reduce((s,h)=>s+(h.method==="Kart"?h.total:h.method==="Qarışıq"?(h.cardAmount||0):0),0);
  const todayExp=expenses.filter(e=>e.date===workDate).reduce((s,e)=>s+e.amount,0);
  const activeCount=ALL_TABLES.filter(t=>(tables[t.id]?.orders||[]).filter(o=>!o.x).length>0).length;
  const filtered=menu.filter(m=>(menuCat==="Hamısı"||m.cat===menuCat)&&(menuSearch===""||m.name.toLowerCase().includes(menuSearch.toLowerCase())));
  const lowStock=stock.filter(s=>s.qty<=s.min);
  const todayKassa=kassaLog.find(k=>k.date===workDate);

  /* ORDER */
  function addOrder(item,qty,note,drink){
    let ns=applyStock(item.name,qty,stock);
    const dm=ns.find(s=>s.name.toLowerCase()===item.name.toLowerCase());
    if(dm)ns=ns.map(s=>s.id===dm.id?{...s,qty:Math.max(0,s.qty-qty)}:s);
    setStock(ns);
    setTables(prev=>({...prev,[selTable]:{...prev[selTable],orders:[...prev[selTable].orders,
      {id:Date.now(),n:item.name,p:item.price,q:qty,note,t:timeStr(),x:false,dsid:dm?.id||null}
    ]}}));
    setShowOrder(false);setMenuSearch("");setCustom({name:"",price:"",qty:1});
  }

  function cancelOrder(tid,oid){
    const o=(tables[tid]?.orders||[]).find(o=>o.id===oid);
    if(o){
      let ns=reverseStock(o.n,o.q,stock);
      if(o.dsid)ns=ns.map(s=>s.id===o.dsid?{...s,qty:s.qty+o.q}:s);
      setStock(ns);
    }
    setTables(prev=>({...prev,[tid]:{...prev[tid],orders:prev[tid].orders.map(o=>o.id===oid?{...o,x:true}:o)}}));
  }

  function payTable(method,cashAmount,cardAmount){
    const total=getTotal(selTable);
    const isIn=selTable<=15;
    setHistory(prev=>[{date:workDate,time:timeStr(),
      label:isIn?`İçəri ${selTable}`:`Çöl ${selTable-15}`,
      orders:tables[selTable].orders.filter(o=>!o.x),total,method,
      ...(method==="Qarışıq"?{cashAmount:cashAmount||0,cardAmount:cardAmount||0}:{})},...prev]);
    setTables(prev=>({...prev,[selTable]:{orders:[]}}));
    setShowPay(false);setSelTable(null);setView("tables");
    setSplitMode(false);setSplitCash("");setSplitCard("");
    showToast("✓ Hesab bağlandı");
  }

  /* KASSA CLOSE */
  function handleKassaClose(data){
    if(!data){setShowKassaClose(false);return;}
    setKassaLog(prev=>{
      const filtered=prev.filter(k=>k.date!==workDate);
      return[{date:workDate,...data},...filtered];
    });
    setKassaStart(data.nextStart);
    setShowKassaClose(false);
    showToast("✓ Gün bağlandı, kassa qeyd edildi");
  }

  /* EXPENSES */
  function addExpense(){
    if(!newExp.desc.trim()||!newExp.amount)return;
    setExpenses(prev=>[...prev,{id:Date.now(),date:workDate,time:timeStr(),...newExp,amount:parseFloat(newExp.amount)}]);
    setNewExp({cat:"Məhsul alışı",desc:"",amount:"",method:"Nağd"});
    showToast("✓ Xərc əlavə edildi");
  }
  function deleteExpense(id){setExpenses(prev=>prev.filter(e=>e.id!==id));showToast("✓ Xərc silindi");}
  function saveEditExpense(){
    if(!editExp)return;
    setExpenses(prev=>prev.map(e=>e.id===editExp.id?{...e,...editExp,amount:parseFloat(editExp.amount)}:e));
    setEditExp(null);showToast("✓ Xərc yeniləndi");
  }

  /* STOCK */
  function updateStock(id,delta){setStock(prev=>prev.map(s=>s.id===id?{...s,qty:Math.max(0,s.qty+delta)}:s));}

  /* PASSWORDS */
  function savePasswords(){
    let u={...creds};
    if(pwForm.a.trim())u.admin=pwForm.a.trim();
    if(pwForm.w.trim())u.waiter=pwForm.w.trim();
    setCreds(u);setPwMsg("Şifrələr yadda saxlandı");setPwForm({a:"",w:""});
    setTimeout(()=>setPwMsg(""),3000);
  }

  /* ADD SET */
  function addNewSet(){
    if(!newSetForm.name.trim()||!newSetForm.price)return;
    const nid=Date.now();
    const drinks=newSetForm.drinkOptions?newSetForm.drinkOptions.split(",").map(s=>s.trim()).filter(Boolean):[];
    const extras=newSetForm.extras?newSetForm.extras.split(",").map(s=>s.trim()).filter(Boolean):[];
    setMenu(prev=>[...prev,{id:nid,name:newSetForm.name.trim(),price:parseFloat(newSetForm.price),cat:"Set"}]);
    setSetsConfig(prev=>[...prev,{id:nid,name:newSetForm.name.trim(),drinkOptions:drinks,defaultDrink:newSetForm.defaultDrink||drinks[0]||"",extras}]);
    setNewSetForm({name:"",price:"",defaultDrink:"",drinkOptions:"",extras:""});
    setShowNewSet(false);showToast("✓ Yeni set yaradıldı");
  }

  if(loading)return<LoadingScreen/>;
  if(!role)return<LoginScreen onLogin={r=>{setRole(r);ls.set("role",r);}} creds={creds}/>;

  const isAdmin=role==="admin";
  const RefBtn=()=>(
    <button onClick={manualRefresh}
      style={{background:hasNew?"var(--gold-dim)":"rgba(255,255,255,0.04)",
        border:`1px solid ${hasNew?"var(--gold-border)":"var(--border-1)"}`,
        borderRadius:"var(--r-sm)",padding:"5px 9px",
        color:hasNew?"var(--gold)":"var(--text-tertiary)",
        fontSize:11,fontFamily:"inherit",cursor:"pointer",
        display:"flex",alignItems:"center",gap:4,fontWeight:hasNew?700:400}}>
      <span className={refreshing?"spin":""} style={{display:"flex"}}><Icon.sync size={11} color={hasNew?"var(--gold)":"var(--text-tertiary)"}/></span>
      {hasNew?"Yeni!":"Yenilə"}
    </button>
  );

  /* ─ DETAIL VIEW ─ */
  if(view==="detail"&&selTable){
    const orders=(tables[selTable]?.orders||[]).filter(o=>!o.x);
    const cancelled=(tables[selTable]?.orders||[]).filter(o=>o.x);
    const total=getTotal(selTable);
    const isIn=selTable<=15;
    const dNum=isIn?selTable:selTable-15;
    const dLoc=isIn?"İçəri":"Çöl";

    return(
      <div className="page">
        <div className="page-header" style={{padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button className="btn btn-ghost" style={{padding:"8px 12px",gap:6,fontSize:13}} onClick={()=>{setView("tables");setSelTable(null);setShowOrder(false);}}>
              <Icon.back size={16}/> Geri
            </button>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700}}>{dLoc} · Masa {dNum}</div>
              <div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:1}}>{workDate}</div>
            </div>
            <RefBtn/>
            <SyncDot status={sync}/>
          </div>
        </div>

        <div style={{padding:"14px 14px",paddingBottom:orders.length>0?140:90}}>
          {orders.length===0&&(
            <div style={{textAlign:"center",padding:"64px 0",color:"var(--text-tertiary)"}} className="anim-fadeup">
              <div style={{fontSize:48,marginBottom:12,opacity:0.3}}>🍽</div>
              <div style={{fontSize:15,fontWeight:500,color:"var(--text-secondary)"}}>Sifariş yoxdur</div>
              <div style={{fontSize:13,marginTop:6}}>Aşağıdakı + düyməsini basın</div>
            </div>
          )}
          {orders.map((o,i)=>(
            <div key={o.id} className="order-item anim-fadeup" style={{animationDelay:`${i*0.04}s`}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:500,color:"var(--text-primary)"}}>{o.n}</div>
                <div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:2}}>{o.q} × {o.p.toFixed(2)}₼{o.note?` · ${o.note}`:""} · {o.t}</div>
              </div>
              <span className="price" style={{fontSize:14,fontWeight:700,color:"var(--gold)",flexShrink:0}}>{(o.q*o.p).toFixed(2)}₼</span>
              <button className="btn-icon" style={{background:"var(--danger-dim)",borderColor:"var(--danger-border)",color:"var(--danger)"}} onClick={()=>cancelOrder(selTable,o.id)}>
                <Icon.x size={14} color="var(--danger)"/>
              </button>
            </div>
          ))}
          {cancelled.length>0&&(
            <details style={{marginTop:10}}>
              <summary style={{fontSize:12,color:"var(--text-tertiary)",cursor:"pointer",padding:"6px 0",userSelect:"none",listStyle:"none",display:"flex",alignItems:"center",gap:6}}>
                <span>Ləğv edilmiş</span><span className="badge badge-muted">{cancelled.length}</span>
              </summary>
              {cancelled.map(o=>(
                <div key={o.id} style={{display:"flex",padding:"8px 10px",background:"rgba(255,255,255,0.02)",borderRadius:"var(--r-sm)",marginBottom:4,opacity:0.35,gap:10,marginTop:4}}>
                  <div style={{flex:1,fontSize:13,textDecoration:"line-through",color:"var(--text-tertiary)"}}>{o.n} × {o.q}</div>
                  <div className="price" style={{fontSize:13,color:"var(--text-tertiary)"}}>{(o.q*o.p).toFixed(2)}₼</div>
                </div>
              ))}
            </details>
          )}
        </div>

        {/* FAB */}
        <button className="fab" style={{bottom:orders.length>0?108:24,right:16}} onClick={()=>setShowOrder(true)}>
          <Icon.plus size={24} color="#080810"/>
        </button>

        {/* Bottom bar */}
        {orders.length>0&&(
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,
            background:"rgba(8,8,16,0.95)",borderTop:"1px solid var(--border-1)",
            padding:"12px 16px 20px",display:"flex",alignItems:"center",gap:12,zIndex:100,
            backdropFilter:"blur(16px)"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:"var(--text-tertiary)"}}>Ümumi</div>
              <div className="price" style={{fontSize:26,fontWeight:900,color:"var(--gold)",letterSpacing:-0.5,marginTop:2}}>{total.toFixed(2)} ₼</div>
            </div>
            <button className="btn btn-success" style={{padding:"13px 22px",fontSize:14,borderRadius:"var(--r-md)"}} onClick={()=>setShowPay(true)}>
              Hesabı Bağla
            </button>
          </div>
        )}

        {/* ORDER SHEET */}
        {showOrder&&(
          <div className="overlay" onClick={e=>{if(e.target===e.currentTarget){setShowOrder(false);setMenuSearch("");}}}>
            <div className="sheet anim-slidup" style={{maxHeight:"90dvh"}}>
              <div className="sheet-handle"/>
              <div className="sheet-header">
                <div style={{fontSize:16,fontWeight:700}}>Sifariş əlavə et</div>
              </div>
              <div style={{padding:"10px 14px 0",flexShrink:0}}>
                <input className="inp" placeholder="Axtar..." value={menuSearch} onChange={e=>setMenuSearch(e.target.value)} style={{marginBottom:8}}/>
                <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10,scrollbarWidth:"none"}}>
                  {ALL_CATS.map(c=>(
                    <button key={c} className={`chip${menuCat===c?" active":""}`} onClick={()=>setMenuCat(c)}>{c}</button>
                  ))}
                </div>
              </div>
              <div className="scroll-area" style={{flex:1,padding:"4px 14px 20px"}}>
                {filtered.map(item=><MenuRow key={item.id} item={item} onAdd={addOrder} stock={stock} setsConfig={setsConfig}/>)}
                {filtered.length===0&&<div style={{textAlign:"center",color:"var(--text-tertiary)",padding:30,fontSize:13}}>Tapılmadı</div>}
                {/* Manual entry */}
                <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--border-1)"}}>
                  <div className="section-label">Əl ilə daxil et</div>
                  <input className="inp" style={{marginBottom:8}} placeholder="Məhsul adı" value={custom.name} onChange={e=>setCustom(p=>({...p,name:e.target.value}))}/>
                  <div style={{display:"flex",gap:8}}>
                    <input className="inp" style={{flex:1}} placeholder="Qiymət" type="number" step="0.01" value={custom.price} onChange={e=>setCustom(p=>({...p,price:e.target.value}))}/>
                    <input className="inp" style={{width:72}} placeholder="Say" type="number" min="1" value={custom.qty} onChange={e=>setCustom(p=>({...p,qty:parseInt(e.target.value)||1}))}/>
                    <button className="btn btn-success" style={{whiteSpace:"nowrap",padding:"10px 14px"}}
                      onClick={()=>{if(custom.name&&custom.price)addOrder({name:custom.name,price:parseFloat(custom.price)},custom.qty,"",null);}}>
                      Əlavə
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* PAY SHEET */}
        {showPay&&(
          <div className="overlay" onClick={e=>{if(e.target===e.currentTarget){setShowPay(false);setSplitMode(false);setSplitCash("");setSplitCard("");}}}>
            <div className="sheet anim-slidup">
              <div className="sheet-handle"/>
              <div className="sheet-header">
                <div style={{fontSize:16,fontWeight:700}}>Hesabı Bağla</div>
                <div style={{fontSize:13,color:"var(--text-tertiary)",marginTop:4}}>Masa {dNum} · {orders.length} sifariş</div>
              </div>
              <div style={{padding:"28px 18px",textAlign:"center"}}>

  if(view==="inventory"){
    const lastInv=invLog.length>0?invLog[0]:null;
    const REASONS=["İsraf / köhnəlmə","Sayılmamış sifariş","Qırılma / tökülmə","Oğurluq","Digər"];

    // Start new inventory session
    function startInventory(){
      const draft=stock.map(s=>({
        stockId:s.id, name:s.name, unit:s.unit,
        system:s.qty, actual:"", reason:"İsraf / köhnəlmə"
      }));

    }

    function updateDraftItem(stockId,field,value){
      setInvDraft(prev=>prev.map(x=>x.stockId===stockId?{...x,[field]:value}:x));
    }

    function confirmInventory(){
      if(!invDraft)return;
      const items=invDraft.map(x=>({
        ...x,
        actual:x.actual===""?x.system:parseFloat(x.actual),
        diff:(x.actual===""?0:parseFloat(x.actual)-x.system)
      }));
      const totalLoss=items.reduce((s,x)=>x.diff<0?s+Math.abs(x.diff):s,0);

      // Update stock with actual counts
      setStock(prev=>prev.map(s=>{
        const item=items.find(x=>x.stockId===s.id);
        if(!item)return s;
        const actual=item.actual;
        return{...s,qty:actual};
      }));

      // Save to log
      const entry={
        id:Date.now(),
        date:workDate,
        time:timeStr(),
        by:role,
        items,
        totalLoss
      };
      setInvLog(prev=>[entry,...prev]);
      setInvDraft(null);
      showToast("✓ İnventarizasiya tamamlandı");
    }

    // Summary of last inventory
    function getLossColor(diff){
      if(diff===0)return"var(--text-tertiary)";
      if(diff>0)return"var(--success)";
      return"var(--danger)";
    }

    return(
      <div className="page">
        <div className="page-header" style={{padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button className="btn btn-ghost" style={{padding:"8px 12px",gap:6,fontSize:13}} onClick={()=>{setInvDraft(null);setView("tables");}}>
              <Icon.back size={16}/> Geri
            </button>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700}}>İnventarizasiya</div>
              {lastInv&&<div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:1}}>Son: {lastInv.date} · {lastInv.time}</div>}
            </div>
            <RefBtn/>
            <SyncDot status={sync}/>
          </div>
        </div>

        <div style={{padding:"14px 14px 80px"}}>

          {/* Active draft */}
          {invDraft?(
            <>
              <div style={{background:"var(--gold-dim)",border:"1px solid var(--gold-border)",borderRadius:"var(--r-md)",padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                <Icon.clipboard size={15} color="var(--gold)"/>
                <span style={{fontSize:13,color:"var(--gold)",fontWeight:600}}>Aktiv sayım — {invDraft.length} məhsul</span>
                <button className="btn btn-ghost" style={{marginLeft:"auto",padding:"4px 10px",fontSize:12}} onClick={()=>setInvDraft(null)}>Ləğv et</button>
              </div>

              {invDraft.map((item,i)=>{
                const actual=item.actual===""?null:parseFloat(item.actual);
                const diff=actual!==null?actual-item.system:null;
                const hasChange=diff!==null&&diff!==0;
                return(
                  <div key={item.stockId} className="card anim-fadeup" style={{padding:14,marginBottom:8,animationDelay:`${i*0.02}s`,
                    borderColor:hasChange&&diff<0?"var(--danger-border)":hasChange&&diff>0?"var(--success-border)":"var(--border-1)"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:600}}>{item.name}</div>
                        <div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:1}}>Sistem: <span className="price" style={{color:"var(--info)",fontWeight:600}}>{item.system} {item.unit}</span></div>
                      </div>
                      {diff!==null&&(
                        <div style={{textAlign:"right"}}>
                          <div className="price" style={{fontSize:18,fontWeight:800,color:getLossColor(diff)}}>
                            {diff>0?"+":""}{diff.toFixed(0)}
                          </div>
                          <div style={{fontSize:10,color:"var(--text-tertiary)"}}>{diff===0?"Dəyişiklik yoxdur":diff>0?"Artıq":"Çatışmazlıq"}</div>
                        </div>
                      )}
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:hasChange&&diff<0?8:0}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:"var(--text-tertiary)",marginBottom:5}}>Faktiki say ({item.unit})</div>
                        <input className="inp" type="number" min="0" step="1"
                          placeholder={`${item.system} (dəyişməyibsə boş burax)`}
                          value={item.actual}
                          onChange={e=>updateDraftItem(item.stockId,"actual",e.target.value)}
                          style={{fontSize:16,fontWeight:600,textAlign:"center"}}/>
                      </div>
                    </div>
                    {hasChange&&diff<0&&(
                      <div>
                        <div style={{fontSize:11,color:"var(--text-tertiary)",marginBottom:5}}>İtki səbəbi</div>
                        <select className="inp" style={{fontSize:13}}
                          value={item.reason}
                          onChange={e=>updateDraftItem(item.stockId,"reason",e.target.value)}>
                          {REASONS.map(r=><option key={r}>{r}</option>)}
                        </select>
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Preview summary */}
              {invDraft.some(x=>x.actual!==""&&parseFloat(x.actual)!==x.system)&&(
                <div className="card" style={{padding:14,marginBottom:14,background:"rgba(248,113,113,0.05)",borderColor:"var(--danger-border)"}}>
                  <div className="section-label" style={{marginBottom:10}}>Sayım Xülasəsi</div>
                  {invDraft.filter(x=>x.actual!==""&&parseFloat(x.actual)!==x.system).map(x=>{
                    const diff=parseFloat(x.actual)-x.system;
                    return(
                      <div key={x.stockId} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--border-1)"}}>
                        <div>
                          <span style={{fontSize:13}}>{x.name}</span>
                          {diff<0&&<span style={{fontSize:11,color:"var(--text-tertiary)",marginLeft:6}}>{x.reason}</span>}
                        </div>
                        <span className="price" style={{fontSize:13,fontWeight:700,color:getLossColor(diff)}}>
                          {diff>0?"+":""}{diff.toFixed(0)} {x.unit}
                        </span>
                      </div>
                    );
                  })}
                  <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 0"}}>
                    <span style={{fontSize:13,fontWeight:600,color:"var(--danger)"}}>Ümumi çatışmazlıq</span>
                    <span className="price" style={{fontSize:14,fontWeight:800,color:"var(--danger)"}}>
                      {invDraft.filter(x=>x.actual!==""&&parseFloat(x.actual)<x.system).reduce((s,x)=>s+(x.system-parseFloat(x.actual)),0).toFixed(0)} ədəd/vahid
                    </span>
                  </div>
                </div>
              )}

              <button className="btn btn-primary" style={{width:"100%",fontSize:15,padding:14}} onClick={confirmInventory}>
                Sayımı Tamamla və Stoku Yenilə
              </button>
            </>
          ):(
            <>
              {/* Start button */}
              <div style={{background:"linear-gradient(135deg,rgba(245,200,66,0.08),rgba(245,200,66,0.03))",border:"1px solid var(--gold-border)",borderRadius:"var(--r-xl)",padding:20,marginBottom:16,textAlign:"center"}}>
                <div style={{fontSize:36,marginBottom:10}}>📋</div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>Həftəlik İnventarizasiya</div>
                <div style={{fontSize:13,color:"var(--text-tertiary)",marginBottom:16,lineHeight:1.5}}>
                  Anbarı fiziki sayın, faktiki rəqəmləri daxil edin.<br/>Sistem fərqi avtomatik hesablayacaq.
                </div>
                <button className="btn btn-primary" style={{fontSize:14,padding:"12px 28px"}} onClick={startInventory}>
                  Sayıma Başla
                </button>
              </div>

              {/* Weekly overview */}
              {invLog.length>0&&(
                <div className="card" style={{padding:14,marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div className="section-label" style={{margin:0}}>Son İnventarizasiya</div>
                    <span className="badge badge-muted">{lastInv.date}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                    {[
                      ["Yoxlanılan",lastInv.items.length,"var(--info)"],
                      ["Uyğun",lastInv.items.filter(x=>x.diff===0).length,"var(--success)"],
                      ["Fərqli",lastInv.items.filter(x=>x.diff!==0).length,"var(--danger)"],
                    ].map(([l,v,c])=>(
                      <div key={l} className="stat-card" style={{textAlign:"center"}}>
                        <div style={{fontSize:11,color:"var(--text-tertiary)"}}>{l}</div>
                        <div className="price" style={{fontSize:22,fontWeight:800,color:c,marginTop:3}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {lastInv.items.filter(x=>x.diff!==0).length>0&&(
                    <div>
                      <div style={{fontSize:11,color:"var(--text-tertiary)",fontWeight:600,marginBottom:8}}>Fərqlər</div>
                      {lastInv.items.filter(x=>x.diff!==0).map(x=>(
                        <div key={x.stockId} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--border-1)"}}>
                          <div>
                            <div style={{fontSize:13}}>{x.name}</div>
                            {x.diff<0&&<div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:1}}>{x.reason}</div>}
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div className="price" style={{fontSize:13,fontWeight:700,color:getLossColor(x.diff)}}>
                              {x.diff>0?"+":""}{x.diff.toFixed(0)} {x.unit}
                            </div>
                            <div style={{fontSize:10,color:"var(--text-tertiary)"}}>{x.actual} faktiki</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {/* History log */}
              {invLog.length>1&&(
                <div className="card" style={{padding:14}}>
                  <div className="section-label" style={{marginBottom:12}}>Keçmiş İnventarizasiyalar</div>
                  {invLog.slice(1).map(entry=>{
                    const losses=entry.items.filter(x=>x.diff<0);
                    const gains=entry.items.filter(x=>x.diff>0);
                    return(
                      <div key={entry.id} style={{padding:"10px 0",borderBottom:"1px solid var(--border-1)"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <span style={{fontSize:13,fontWeight:600}}>{entry.date}</span>
                          <div style={{display:"flex",gap:8}}>
                            {losses.length>0&&<span className="badge badge-danger">−{losses.length} məhsul</span>}
                            {gains.length>0&&<span className="badge badge-success">+{gains.length} məhsul</span>}
                            {losses.length===0&&gains.length===0&&<span className="badge badge-muted">Fərqsiz</span>}
                          </div>
                        </div>
                        {losses.length>0&&(
                          <div style={{fontSize:11,color:"var(--text-tertiary)"}}>
                            {losses.map(x=>`${x.name} (${x.diff.toFixed(0)} ${x.unit})`).join(", ")}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              {invLog.length===0&&(
                <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-tertiary)"}}>
                  <div style={{fontSize:40,marginBottom:10,opacity:0.3}}>📋</div>
                  <div style={{fontSize:13}}>Hələ inventarizasiya aparılmayıb</div>
                </div>
              )}
            </>
          )}
        </div>
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>
    );
  }

  /* ─ SETTINGS VIEW ─ */
  if(view==="settings"){
    return(
      <div className="page">
        <div className="page-header" style={{padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button className="btn btn-ghost" style={{padding:"8px 12px",gap:6,fontSize:13}} onClick={()=>setView("tables")}>
              <Icon.back size={16}/> Geri
            </button>
            <div style={{flex:1,fontSize:15,fontWeight:700}}>Ayarlar</div>
            <RefBtn/>
            <SyncDot status={sync}/>
          </div>
        </div>
        <div style={{padding:16,paddingBottom:40}}>
          {/* Menu */}
          <div className="card" style={{padding:16,marginBottom:12}}>
            <div className="section-label">Menyu — {menu.length} məhsul</div>
            <div className="card-inset" style={{padding:12,marginBottom:12}}>
              <input className="inp" style={{marginBottom:8}} placeholder="Məhsul adı" value={newItem.name} onChange={e=>setNewItem(p=>({...p,name:e.target.value}))}/>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <input className="inp" style={{flex:1}} placeholder="Qiymət ₼" type="number" step="0.01" value={newItem.price} onChange={e=>setNewItem(p=>({...p,price:e.target.value}))}/>
                <select className="inp" style={{flex:1}} value={newItem.cat} onChange={e=>setNewItem(p=>({...p,cat:e.target.value}))}>
                  {ALL_CATS.filter(c=>c!=="Hamısı").map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <button className="btn btn-success" style={{width:"100%"}} onClick={()=>{if(newItem.name&&newItem.price){setMenu(prev=>[...prev,{id:Date.now(),name:newItem.name.trim(),price:parseFloat(newItem.price),cat:newItem.cat}]);setNewItem({name:"",price:"",cat:"İçki"});showToast("✓ Məhsul əlavə edildi");}}}>Əlavə et</button>
            </div>
            <div style={{maxHeight:300,overflowY:"auto"}}>
              {ALL_CATS.filter(c=>c!=="Hamısı").map(cat=>{
                const items=menu.filter(m=>m.cat===cat);if(!items.length)return null;
                return(<div key={cat} style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:"var(--text-tertiary)",fontWeight:700,textTransform:"uppercase",letterSpacing:1,padding:"4px 0"}}>{cat}</div>
                  {items.map(item=>(
                    <div key={item.id} style={{display:"flex",alignItems:"center",padding:"9px 10px",background:"rgba(255,255,255,0.02)",borderRadius:"var(--r-sm)",marginBottom:4,border:"1px solid var(--border-1)"}}>
                      <div style={{flex:1,fontSize:13}}>{item.name}</div>
                      <span className="price" style={{fontSize:13,color:"var(--gold)",marginRight:10}}>{item.price.toFixed(2)}₼</span>
                      {delConfirm===item.id?(
                        <div style={{display:"flex",gap:5}}>
                          <button className="btn btn-danger" style={{padding:"4px 8px",fontSize:12}} onClick={()=>{setMenu(prev=>prev.filter(m=>m.id!==item.id));setDelConfirm(null);}}>Sil</button>
                          <button className="btn btn-ghost" style={{padding:"4px 8px",fontSize:12}} onClick={()=>setDelConfirm(null)}>Ləğv</button>
                        </div>
                      ):(
                        <button className="btn-icon" style={{background:"var(--danger-dim)",borderColor:"var(--danger-border)"}} onClick={()=>setDelConfirm(item.id)}>
                          <Icon.trash size={12} color="var(--danger)"/>
                        </button>
                      )}
                    </div>
                  ))}
                </div>);
              })}
            </div>
          </div>

          {/* Sets */}
          <div className="card" style={{padding:16,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div className="section-label" style={{margin:0}}>Set İdarəsi — {setsConfig.length} set</div>
              <button className="btn btn-ghost" style={{padding:"5px 10px",fontSize:12,gap:4}} onClick={()=>setShowNewSet(true)}>
                <Icon.plus size={12}/> Yeni
              </button>
            </div>
            {setsConfig.map(sc=>(
              <div key={sc.id} className="card-inset" style={{padding:"10px 12px",marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:600}}>{sc.name}</span>
                  <span className="price" style={{fontSize:13,color:"var(--gold)"}}>{menu.find(m=>m.id===sc.id)?.price.toFixed(2)||"?"}₼</span>
                </div>
                <div style={{fontSize:11,color:"var(--text-tertiary)"}}>İçki: {sc.drinkOptions.join(", ")||"—"}</div>
                {sc.extras.length>0&&<div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:2}}>Əlavə: {sc.extras.join(", ")}</div>}
              </div>
            ))}
          </div>

          {/* Work date */}
          <div className="card" style={{padding:16,marginBottom:12}}>
            <div className="section-label">İş Günü Tarixi</div>
            <div style={{fontSize:12,color:"var(--text-tertiary)",marginBottom:10}}>Gecə 06:00-dan əvvəl açıldıqda əvvəlki gün avtomatik seçilir</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span className="price" style={{fontSize:20,fontWeight:800,color:"var(--gold)"}}>{workDate}</span>
              <button className="btn btn-secondary" style={{padding:"8px 14px",fontSize:13}} onClick={()=>{setDateInput(workDate);setShowDate(true);}}>Dəyiş</button>
            </div>
          </div>

          {/* Passwords */}
          <div className="card" style={{padding:16,marginBottom:12}}>
            <div className="section-label">Şifrələr</div>
            <div style={{fontSize:12,color:"var(--text-tertiary)",marginBottom:6}}>Admin şifrəsi</div>
            <input className="inp" style={{marginBottom:10}} type="password" placeholder="Yeni admin şifrəsi" value={pwForm.a} onChange={e=>setPwForm(p=>({...p,a:e.target.value}))}/>
            <div style={{fontSize:12,color:"var(--text-tertiary)",marginBottom:6}}>Ofisiant şifrəsi</div>
            <input className="inp" style={{marginBottom:12}} type="password" placeholder="Yeni ofisiant şifrəsi" value={pwForm.w} onChange={e=>setPwForm(p=>({...p,w:e.target.value}))}/>
            {pwMsg&&<div style={{color:"var(--success)",fontSize:13,marginBottom:10,display:"flex",alignItems:"center",gap:5}}><Icon.check size={13} color="var(--success)"/>{pwMsg}</div>}
            <button className="btn btn-secondary" style={{width:"100%"}} onClick={savePasswords}>Şifrələri Saxla</button>
          </div>

          {/* Reset */}
          <div className="card" style={{padding:16}}>
            <div className="section-label">Masaları Sıfırla</div>
            <div style={{fontSize:12,color:"var(--text-tertiary)",marginBottom:12}}>Bütün açıq sifarişlər silinəcək</div>
            <button className="btn btn-danger" style={{padding:"9px 16px"}} onClick={()=>setShowReset(true)}>Masaları Təmizlə</button>
          </div>
        </div>

        {/* Date modal */}
        {showDate&&(
          <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowDate(false);}}>
            <div className="sheet anim-slidup">
              <div className="sheet-handle"/>
              <div className="sheet-header"><div style={{fontSize:15,fontWeight:700,color:"var(--gold)"}}>İş günü tarixi</div></div>
              <div className="sheet-body">
                <input className="inp" placeholder="28.05.2026" value={dateInput} onChange={e=>setDateInput(e.target.value)}/>
              </div>
              <div className="sheet-footer">
                <div style={{display:"flex",gap:10}}>
                  <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setShowDate(false)}>Ləğv</button>
                  <button className="btn btn-primary" style={{flex:1}} onClick={()=>{if(dateInput){setWorkDate(dateInput);setShowDate(false);}showToast("✓ Tarix yeniləndi");}}>Saxla</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Reset modal */}
        {showReset&&(
          <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowReset(false);}}>
            <div className="sheet anim-slidup">
              <div className="sheet-handle"/>
              <div className="sheet-header">
                <div style={{fontSize:15,fontWeight:700,color:"var(--danger)",display:"flex",alignItems:"center",gap:8}}><Icon.warning size={15} color="var(--danger)"/>Masaları Sıfırla?</div>
              </div>
              <div className="sheet-body">
                <p style={{fontSize:14,color:"var(--text-secondary)",lineHeight:1.5}}>Bütün açıq sifarişlər silinəcək. Bu əməliyyat geri alına bilməz.</p>
              </div>
              <div className="sheet-footer">
                <div style={{display:"flex",gap:10}}>
                  <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setShowReset(false)}>Ləğv et</button>
                  <button className="btn btn-danger" style={{flex:1}} onClick={()=>{setTables(initTables());setShowReset(false);showToast("✓ Masalar sıfırlandı");}}>Sıfırla</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* New set modal */}
        {showNewSet&&(
          <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowNewSet(false);}}>
            <div className="sheet anim-slidup" style={{maxHeight:"85dvh"}}>
              <div className="sheet-handle"/>
              <div className="sheet-header"><div style={{fontSize:15,fontWeight:700,color:"var(--gold)"}}>Yeni Set Yarat</div></div>
              <div className="sheet-body scroll-area">
                {[["Set adı","Set 20",newSetForm.name,v=>setNewSetForm(p=>({...p,name:v})),"text"],
                  ["Qiymət ₼","20.00",newSetForm.price,v=>setNewSetForm(p=>({...p,price:v})),"number"],
                  ["İçki seçimləri (vergüllə)","Pepsi 1L, Kola 1L",newSetForm.drinkOptions,v=>setNewSetForm(p=>({...p,drinkOptions:v})),"text"],
                  ["Default içki","Pepsi 1L",newSetForm.defaultDrink,v=>setNewSetForm(p=>({...p,defaultDrink:v})),"text"],
                  ["Stokdan azalacaq əlavələr","Tost, Tost",newSetForm.extras,v=>setNewSetForm(p=>({...p,extras:v})),"text"],
                ].map(([label,ph,val,onChange,type])=>(
                  <div key={label} style={{marginBottom:12}}>
                    <div style={{fontSize:12,color:"var(--text-tertiary)",fontWeight:600,marginBottom:6}}>{label}</div>
                    <input className="inp" type={type} placeholder={ph} value={val} onChange={e=>onChange(e.target.value)}/>
                  </div>
                ))}
              </div>
              <div className="sheet-footer">
                <div style={{display:"flex",gap:10}}>
                  <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setShowNewSet(false)}>Ləğv</button>
                  <button className="btn btn-primary" style={{flex:1}} onClick={addNewSet}>Yarat</button>
                </div>
              </div>
            </div>
          </div>
        )}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>
    );
  }

  /* ─ MAIN TABLE VIEW ─ */
  const NAV_ITEMS=[
    {v:"tables",icon:<Icon.table size={17}/>,label:"Masalar",show:true},
    {v:"history",icon:<Icon.chart size={17}/>,label:"Hesabat",show:isAdmin},
    {v:"stock",icon:<Icon.box size={17}/>,label:"Stok",show:isAdmin},
    {v:"expenses",icon:<Icon.cash size={17}/>,label:"Xərc",show:isAdmin},
    {v:"inventory",icon:<Icon.clipboard size={17}/>,label:"Sayım",show:isAdmin},
    {v:"settings",icon:<Icon.settings size={17}/>,label:"Ayar",show:isAdmin},
  ].filter(t=>t.show);

  return(
    <div className="app-shell">
      {/* ── SIDEBAR (desktop) ── */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div style={{width:34,height:34,background:"var(--gold-dim)",border:"1px solid var(--gold-border)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>☕</div>
          <div>
            <div style={{fontSize:14,fontWeight:800}}>PitStop</div>
            <div style={{fontSize:10,color:"var(--text-tertiary)"}}>Masa İdarəsi</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          {NAV_ITEMS.map(t=>(
            <button key={t.v} className={`sidebar-item${view===t.v?" active":""}`} onClick={()=>setView(t.v)}>
              {t.icon}<span>{t.label}</span>
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <button onClick={()=>{setDateInput(workDate);setShowDate(true);}}
            style={{width:"100%",background:"var(--surface-2)",border:"1px solid var(--border-1)",borderRadius:"var(--r-md)",padding:"9px 12px",display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:8,fontFamily:"inherit"}}>
            <span>📅</span>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{fontSize:10,color:"var(--text-tertiary)"}}>İş günü</div>
              <div style={{fontSize:12,fontWeight:700,color:"var(--gold)"}}>{workDate}</div>
            </div>
          </button>
          {isAdmin&&<button onClick={()=>setShowKassaClose(true)}
            style={{width:"100%",background:"var(--gold-dim)",border:"1px solid var(--gold-border)",borderRadius:"var(--r-md)",padding:"9px 12px",display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:8,fontFamily:"inherit",color:"var(--gold)",fontWeight:600,fontSize:13}}>
            🔒 {todayKassa?"Kassa bağlanıb":"Günü Bağla"}
          </button>}
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 2px"}}>
            <span className={`badge ${isAdmin?"badge-gold":"badge-success"}`}>{isAdmin?"Admin":"Ofisiant"}</span>
            <RefBtn/>
            <SyncDot status={sync}/>
            <RefBtn/>
            <button className="btn btn-ghost" style={{marginLeft:"auto",padding:"5px 8px",fontSize:11}} onClick={logout}>Çıx</button>
          </div>
        </div>
      </aside>

      {/* ── MAIN CONTENT ── */}
      <div className="main-content">
      {/* Header */}
      <div className="page-header" style={{padding:"12px 16px 10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:34,height:34,background:"var(--gold-dim)",border:"1px solid var(--gold-border)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>☕</div>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:800,letterSpacing:-0.3}}>PitStop</div>
            <div style={{fontSize:10,color:"var(--text-tertiary)",marginTop:-1}}>Masa İdarəsi</div>
          </div>
          <span className={`badge ${isAdmin?"badge-gold":"badge-success"}`}>{isAdmin?"Admin":"Ofisiant"}</span>
          <RefBtn/>
          <SyncDot status={sync}/>
          <button className="btn btn-ghost" style={{padding:"6px 10px",fontSize:12}} onClick={logout}>Çıx</button>
        </div>
        {/* Stats */}
        <div className="stats-row" style={{display:"flex",gap:7,overflowX:"auto",scrollbarWidth:"none",paddingBottom:2}}>
          {(isAdmin?[
            {l:"Aktiv",v:activeCount,c:"var(--success)"},
            {l:"Gəlir",v:todayTotal.toFixed(2)+"₼",c:"var(--gold)"},
            {l:"Nağd",v:todayCash.toFixed(2)+"₼",c:"var(--text-secondary)"},
            {l:"Kart",v:todayCard.toFixed(2)+"₼",c:"var(--info)"},
          ]:[
            {l:"Aktiv masa",v:activeCount,c:"var(--success)"},
          ]).map(({l,v,c})=>(
            <div key={l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid var(--border-1)",borderRadius:"var(--r-sm)",padding:"6px 12px",fontSize:11,whiteSpace:"nowrap",flexShrink:0}}>
              <span style={{color:"var(--text-tertiary)"}}>{l}: </span>
              <span className="price" style={{color:c,fontWeight:700}}>{v}</span>
            </div>
          ))}
          {isAdmin&&(
            <button onClick={()=>setShowKassaClose(true)}
              style={{background:"var(--gold-dim)",border:"1px solid var(--gold-border)",borderRadius:"var(--r-sm)",padding:"6px 12px",fontSize:11,whiteSpace:"nowrap",flexShrink:0,cursor:"pointer",color:"var(--gold)",fontWeight:600,fontFamily:"inherit"}}>
              🔒 {todayKassa?"Kassaya bax":"Günü Bağla"}
            </button>
          )}
        </div>
      </div>

      {/* Low stock warning */}
      {lowStock.length>0&&isAdmin&&(
        <div className="kassa-warning" onClick={()=>setView("stock")}>
          <Icon.warning size={15} color="var(--warning)"/>
          <span style={{fontSize:12,color:"var(--warning)",fontWeight:500}}>{lowStock.map(s=>s.name).join(", ")} az qalıb</span>
          <span style={{fontSize:11,color:"var(--text-tertiary)",marginLeft:"auto"}}>Stoka bax →</span>
        </div>
      )}

      {/* Navigation */}
      <div className="nav-bar">
        {[
          {v:"tables",icon:<Icon.table size={18}/>,label:"Masalar",show:true},
          {v:"history",icon:<Icon.chart size={18}/>,label:"Hesabat",show:isAdmin},
          {v:"stock",icon:<Icon.box size={18}/>,label:"Stok",show:isAdmin},
          {v:"expenses",icon:<Icon.cash size={18}/>,label:"Xərc",show:isAdmin},
          {v:"inventory",icon:<Icon.clipboard size={18}/>,label:"Sayım",show:isAdmin},
          {v:"settings",icon:<Icon.settings size={18}/>,label:"Ayar",show:isAdmin},
        ].filter(t=>t.show).map(t=>(
          <button key={t.v} className={`nav-tab${view===t.v?" active":""}`} onClick={()=>setView(t.v)}>
            <span className="nav-tab-icon">{t.icon}</span>
            {t.label}
          </button>
        ))}
      </div>

      {/* Loc tabs */}
      {view==="tables"&&(
        <>
          <div style={{display:"flex",borderBottom:"1px solid var(--border-1)"}}>
            {[["içəri","İçəri (15)"],["çöl","Çöl (17)"]].map(([v,l])=>(
              <button key={v} onClick={()=>setLoc(v)}
                style={{flex:1,padding:"11px",background:"transparent",border:"none",
                  borderBottom:loc===v?"2px solid var(--gold)":"2px solid transparent",
                  color:loc===v?"var(--gold)":"var(--text-tertiary)",
                  fontWeight:loc===v?700:400,fontSize:13,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,padding:"14px 12px"}}>
            {ALL_TABLES.filter(t=>t.loc===loc).map((t,i)=>{
              const orders=(tables[t.id]?.orders||[]).filter(o=>!o.x);
              const hasO=orders.length>0;
              const total=getTotal(t.id);
              const dNum=t.id<=15?t.id:t.id-15;
              return(
                <div key={t.id} className={`table-card${hasO?" occupied":""} anim-fadeup`}
                  style={{animationDelay:`${i*0.025}s`}}
                  onClick={()=>{setSelTable(t.id);setView("detail");}}>
                  {/* Status dot */}
                  <div style={{position:"absolute",top:10,right:10,width:7,height:7,borderRadius:"50%",
                    background:hasO?"var(--success)":"var(--border-2)",
                    boxShadow:hasO?"0 0 6px var(--success)":"none"}}/>
                  <div style={{fontSize:26,fontWeight:900,color:hasO?"var(--text-primary)":"var(--text-tertiary)",lineHeight:1}}>{dNum}</div>
                  <div className="price" style={{fontSize:13,fontWeight:700,color:hasO?"var(--success)":"var(--text-tertiary)"}}>{hasO?`${total.toFixed(2)} ₼`:"Boş"}</div>
                  {hasO&&<div style={{fontSize:10,color:"var(--text-tertiary)"}}>{orders.length} sif.</div>}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Date modal */}
      {showDate&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowDate(false);}}>
          <div className="sheet anim-slidup">
            <div className="sheet-handle"/>
            <div className="sheet-header"><div style={{fontSize:15,fontWeight:700,color:"var(--gold)"}}>İş günü tarixi</div></div>
            <div className="sheet-body">
              <input className="inp" placeholder="28.05.2026" value={dateInput} onChange={e=>setDateInput(e.target.value)}/>
            </div>
            <div className="sheet-footer">
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setShowDate(false)}>Ləğv</button>
                <button className="btn btn-primary" style={{flex:1}} onClick={()=>{if(dateInput){setWorkDate(dateInput);setShowDate(false);}}}>Saxla</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Kassa close */}
      {showKassaClose&&(
        <KassaCloseModal
          workDate={workDate}
          todayTotal={todayTotal}
          todayCash={todayCash}
          todayExp={todayExp}
          kassaStart={kassaStart}
          onClose={handleKassaClose}
        />
      )}

      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>{/* main-content */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
