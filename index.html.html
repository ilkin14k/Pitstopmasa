// ── Supabase helpers ──
const sbFetch = async (path, opts={}, token=null) => {
  const headers = {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${token || SUPABASE_KEY}`,
    "Content-Type": "application/json",
    Prefer: opts.prefer || "return=representation",
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { ...opts, headers });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const t = await res.text(); return t ? JSON.parse(t) : [];
};

const authFetch = async (path, body) => {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/${path}`, {
    method: "POST",
    headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || "Xəta");
  return data;
};

                        <td style={S.td}><span style={{background:p.cari>0?"#14532d22":"#7f1d1d22",color:p.cari>0?"#4ade80":"#f87171",padding:"2px 10px",borderRadius:20,fontWeight:600,fontSize:12}}>{p.cari}</span></td>
                        <td style={{...S.td,color:"#38bdf8"}}>{fmt(p.cari*(Number(p.satis)-Number(p.maya)))} ₼</td>
                        <td style={{...S.td,color:"#a78bfa"}}>{fmt(p.cari*Number(p.maya))} ₼</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>}

          {/* SALES */}
          {tab==="sales"&&<div>
            <div style={{...S.card,padding:18,marginBottom:16}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#C9A84C",marginBottom:14}}>Yeni Satış Əlavə Et</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:12}}>
                <select value={saleForm.mehsul} onChange={e=>setSaleForm(f=>({...f,mehsul:e.target.value,reng:""}))} style={S.sel}>
                  <option value="">Məhsul seçin...</option>
                  {uniqueNames.map(n=><option key={n} value={n}>{n}</option>)}
                </select>
                <select value={saleForm.reng} onChange={e=>setSaleForm(f=>({...f,reng:e.target.value}))} style={S.sel} disabled={!saleForm.mehsul}>
                  <option value="">Rəng seçin...</option>
                  {colorsFor(saleForm.mehsul).map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                {[["satis_qiymet","Satış qiyməti (₼)"],["catdirilma","Çatdırılma (₼)"],["paketleme","Paketləmə (₼)"]].map(([k,ph])=>(
                  <input key={k} type="number" placeholder={ph} value={saleForm[k]} onChange={e=>setSaleForm(f=>({...f,[k]:e.target.value}))} style={S.inp}/>
                ))}
              </div>
              <button onClick={handleAddSale} style={S.btn}>+ Satış əlavə et</button>
            </div>
            <div style={S.card}>
              <div style={{padding:"14px 16px",borderBottom:"1px solid #222"}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#C9A84C"}}>Satış Tarixçəsi</span>
                <span style={{marginLeft:10,fontSize:12,color:"#444"}}>{sales.length} satış · <span style={{color:"#C9A84C"}}>{fmt(totalRealized)} ₼</span></span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#111"}}>
                    {["Tarix","Məhsul","Rəng","Satış","Maya","Çatd.","Pakt.","Qazanc",""].map(h=><th key={h} style={S.th}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {sales.map((s,i)=>{
                      const q=Number(s.satis_qiymet)-Number(s.maya)-Number(s.catdirilma)-Number(s.paketleme);
                      return(<tr key={s.id} style={{borderTop:"1px solid #1a1a1a",background:i%2===0?"#161616":"#131313"}}>
                        <td style={{...S.td,color:"#555",whiteSpace:"nowrap"}}>{s.tarix}</td>
                        <td style={{...S.td,color:"#e5ddd0"}}>{s.mehsul}</td>
                        <td style={S.td}><span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:"50%",background:cdot(s.reng),display:"inline-block"}}/><span style={{color:"#aaa"}}>{s.reng}</span></span></td>
                        <td style={{...S.td,color:"#C9A84C"}}>{s.satis_qiymet} ₼</td>
                        <td style={{...S.td,color:"#888"}}>{s.maya} ₼</td>
                        <td style={{...S.td,color:"#888"}}>{s.catdirilma} ₼</td>
                        <td style={{...S.td,color:"#888"}}>{s.paketleme} ₼</td>
                        <td style={{...S.td,color:q>=0?"#22c55e":"#ef4444",fontWeight:600}}>{fmt(q)} ₼</td>
                        <td style={S.td}><button onClick={()=>doDelete("sales",s.id)} style={S.del}>Sil</button></td>
                      </tr>);
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>}

          {/* STOCK */}
          {tab==="stock"&&<div>
            <div style={{...S.card,padding:18,marginBottom:16}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#C9A84C",marginBottom:14}}>Yeni Məhsul Əlavə Et</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:12}}>
                {[["name","Məhsul adı"],["color","Rəng"],["maya","Maya (₼)"],["satis","Satış qiyməti (₼)"],["bas","Say"]].map(([k,ph])=>(
                  <input key={k} placeholder={ph} value={prodForm[k]} onChange={e=>setProdForm(f=>({...f,[k]:e.target.value}))} style={S.inp}/>
                ))}
              </div>
              <button onClick={handleAddProduct} style={S.btn}>+ Məhsul əlavə et</button>
            </div>
            <div style={S.card}>
              <div style={{padding:"14px 16px",borderBottom:"1px solid #222"}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#C9A84C"}}>Stok Siyahısı</span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#111"}}>
                    {["Məhsul","Rəng","Maya","Satış","Başlanğıc","Cari Stok","Gələcək Qaz.","Maya Dəy.",""].map(h=><th key={h} style={S.th}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {computed.map((p,i)=>(
                      <tr key={p.id} style={{borderTop:"1px solid #1a1a1a",background:i%2===0?"#161616":"#131313"}}>
                        <td style={{...S.td,color:"#e5ddd0"}}>{p.name}</td>
                        <td style={S.td}><span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:"50%",background:cdot(p.color),display:"inline-block"}}/><span style={{color:"#aaa"}}>{p.color}</span></span></td>
                        <td style={{...S.td,color:"#888"}}>{p.maya} ₼</td>
                        <td style={{...S.td,color:"#C9A84C"}}>{p.satis} ₼</td>
                        <td style={{...S.td,color:"#555"}}>{p.bas}</td>
                        <td style={S.td}><span style={{background:p.cari>0?"#14532d33":"#7f1d1d33",color:p.cari>0?"#4ade80":"#f87171",padding:"2px 12px",borderRadius:20,fontWeight:600}}>{p.cari}</span></td>
                        <td style={{...S.td,color:"#38bdf8"}}>{fmt(p.cari*(Number(p.satis)-Number(p.maya)))} ₼</td>
                        <td style={{...S.td,color:"#a78bfa"}}>{fmt(p.cari*Number(p.maya))} ₼</td>
                        <td style={S.td}><button onClick={()=>doDelete("products",p.id)} style={S.del}>Sil</button></td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot><tr style={{borderTop:"2px solid #C9A84C33",background:"#111"}}>
                    <td colSpan={6} style={{...S.td,color:"#C9A84C",fontWeight:600,fontSize:11,letterSpacing:1}}>CƏMİ</td>
                    <td style={{...S.td,color:"#38bdf8",fontWeight:700}}>{fmt(futureGain)} ₼</td>
                    <td style={{...S.td,color:"#a78bfa",fontWeight:700}}>{fmt(totalMaya)} ₼</td>
                    <td/>
                  </tr></tfoot>
                </table>
              </div>
            </div>
          </div>}

          {/* EXPENSES */}
          {tab==="expenses"&&<div>
            <div style={{...S.card,padding:18,marginBottom:16}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#C9A84C",marginBottom:14}}>Yeni Xərc Əlavə Et</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <input placeholder="Xərc haqqında (Meta, Kargo...)" value={expForm.haqqinda} onChange={e=>setExpForm(f=>({...f,haqqinda:e.target.value}))} style={S.inp}/>
                <input type="number" placeholder="Məbləğ (₼)" value={expForm.meblег} onChange={e=>setExpForm(f=>({...f,meblег:e.target.value}))} style={S.inp}/>
              </div>
              <button onClick={handleAddExpense} style={S.btn}>+ Xərc əlavə et</button>
            </div>
            <div style={S.card}>
              <div style={{padding:"14px 16px",borderBottom:"1px solid #222",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#C9A84C"}}>Xərc Siyahısı</span>
                <span style={{color:"#ef4444",fontWeight:600}}>Cəmi: {fmt(totalExpenses)} ₼</span>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"#111"}}>
                  {["Tarix","Xərc haqqında","Məbləğ",""].map(h=><th key={h} style={S.th}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {expenses.map((e,i)=>(
                    <tr key={e.id} style={{borderTop:"1px solid #1a1a1a",background:i%2===0?"#161616":"#131313"}}>
                      <td style={{...S.td,color:"#555"}}>{e.tarix}</td>
                      <td style={{...S.td,color:"#e5ddd0"}}>{e.haqqinda}</td>
                      <td style={{...S.td,color:"#ef4444",fontWeight:600}}>{fmt(e.meblег)} ₼</td>
                      <td style={S.td}><button onClick={()=>doDelete("expenses",e.id)} style={S.del}>Sil</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>}

        </>}
      </main>
    </div>
  );
}

// ══════════════════════════════════════════
// ROOT — auth state manager
// ══════════════════════════════════════════
function App() {
  const [token, setToken] = useState(() => localStorage.getItem("glamoni_token"));
  const [user,  setUser]  = useState(null);

  const handleLogin = (t, u) => {
    localStorage.setItem("glamoni_token", t);
    setToken(t); setUser(u);
  };

  const handleLogout = () => {
    localStorage.removeItem("glamoni_token");
    setToken(null); setUser(null);
  };

  if (!token) return <LoginScreen onLogin={handleLogin}/>;
  return <Dashboard token={token} user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
